  // when they happen to be anchored to different elements.
  function findOverlappingStrokeAt(clientX, clientY, radius) {
    const r2 = radius * radius;
    const rectByAnchor = new Map();
    for (let i = strokes.length - 1; i >= 0; i--) {
      const s = strokes[i];
      if (!s || !s.points || s.points.length === 0) continue;
      if (s.tool === "eraser") continue;
      if (!s.anchor || !s.anchor.id) continue;
      const p0 = s.points[0];
      if (p0.fx === undefined) continue; // legacy unanchored
      let r = rectByAnchor.get(s.anchor.id);
      if (r === undefined) {
        const el = document.getElementById(s.anchor.id);
        r = el ? el.getBoundingClientRect() : null;
        rectByAnchor.set(s.anchor.id, r);
      }
      if (!r || r.width <= 0 || r.height <= 0) continue;
      for (const p of s.points) {
        if (p.fx === undefined) continue;
        const px = r.left + p.fx * r.width;
        const py = r.top  + p.fy * r.height;
        const dx = px - clientX, dy = py - clientY;
        if (dx*dx + dy*dy <= r2) return s;
      }
    }
    return null;
  }

  // findFallbackAnchorElement: same heuristic as
  // findNearestAnchorAbove (nearest [id] preceding the click) but
  // returns the DOM element instead of a saved-anchor object.
  // Used when findContainingAnchor returns null (e.g. user clicked
  // on a margin / wrapper without an [id]).
  function findFallbackAnchorElement(clientX, clientY) {
    const absY = clientY + window.scrollY;
    const list = getAnchorList();
    let best = null;
    let bestTop = -Infinity;
    for (const el of list) {
      const r = el.getBoundingClientRect();
      if (r.width === 0 && r.height === 0) continue;
      const top = r.top + window.scrollY;
      if (top <= absY + 4 && top > bestTop) {
        best = el;
        bestTop = top;
      }
    }
    return best;
  }

  function saveJson() {
    // Best-effort on-save upgrade: convert any legacy v2 unanchored
    // strokes to v4 fractional, using the current layout to find an
    // anchor. The user clicking "Save" implies the strokes currently
    // look aligned with the live page, so it's safe to bake the
    // current anchor rect in as the saved one.
    let attached = 0;
    const strokesOut = strokes.map((s) => {
      if (s.v === 4) return s;
      if (!s.points || s.points.length === 0) return s;
      const p0 = s.points[0];
      if (p0.fx !== undefined) return { ...s, v: 4 };

      // p0.x / p0.y are doc-coords. Convert to viewport (clientX/Y)
      // for elementFromPoint hit-testing.
      const clientX = p0.x - window.scrollX;
      const clientY = p0.y - window.scrollY;
      const el = findContainingAnchor(clientX, clientY)
              || findFallbackAnchorElement(clientX, clientY);
      if (!el) return s;
      const r = el.getBoundingClientRect();
      if (r.width <= 0 || r.height <= 0) return s;
      attached++;
      return {
        v: 4,
        tool: s.tool, color: s.color, width: s.width,
        anchor: { id: el.id, savedWidth: r.width, savedHeight: r.height },
        points: s.points.map(p => ({
          fx: (p.x - (r.left + window.scrollX)) / r.width,
          fy: (p.y - (r.top  + window.scrollY)) / r.height,
          p: p.p,
        })),
      };
    });
    if (attached > 0) {
      strokes = strokesOut;
      if (window.console) {
        console.info(
          "[annotation v4] On-save upgrade: anchored=" + attached +
          " — file is now zoom-robust."
        );
      }
    }

    const data = {
      version: 4,                                  // v4 = fractional anchored strokes
      coordinates: "anchor-relative-fraction",     // (fx, fy) ∈ [0,1]² of anchor rect
      url: location.href,
      title: document.title,
      savedAt: new Date().toISOString(),
      viewport: {
        width: window.innerWidth,
        height: window.innerHeight,
        devicePixelRatio: window.devicePixelRatio || 1,
      },
      document: {
        scrollWidth: document.documentElement.scrollWidth,
        scrollHeight: document.documentElement.scrollHeight,
      },
      strokes: strokesOut,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {
      type: "application/json",
    });
    const url = URL.createObjectURL(blob);
    const slug = (document.title || "annotations")
      .toLowerCase().replace(/[^a-z0-9-_]+/g, "-").replace(/^-+|-+$/g, "")
      .slice(0, 60) || "annotations";
    const a = el("a", {
      href: url,
      download: slug + "__" + new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-") + ".json",
    });
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }
  function loadJson(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data || !Array.isArray(data.strokes)) {
          alert("Not a valid annotation file.");
          return;
        }
        strokes = realignStrokesToCurrentDocument(data);
        redraw();
      } catch (err) {
        alert("Failed to parse JSON: " + err.message);
      }
    };
    reader.readAsText(file);
  }

  async function autoLoadJsonIfConfigured() {
    const cfg = window.__ANNOTATION_V4_AUTOLOAD__;
    if (!cfg) return;
    const url = typeof cfg === "string" ? cfg : cfg.url;
    if (!url) return;
    try {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(res.status + " " + res.statusText);
      }
      const data = await res.json();
      if (!data || !Array.isArray(data.strokes)) {
        throw new Error("not a valid annotation file");
      }
      strokes = realignStrokesToCurrentDocument(data);
      if (cfg.enable) {
        setEnabled(true);
      }
      if (cfg.tool && TOOLS.includes(cfg.tool)) {
        setTool(cfg.tool);
      }
      redraw();
      if (window.console) {
        console.info("[annotation v4] auto-loaded: " + url);
      }
    } catch (err) {
      if (window.console) {
        console.warn("[annotation v4] auto-load failed:", url, err);
      }
    }
  }

  // ── Document-coord anchor lookup (off-screen-safe) ────────────
  // findContainingAnchor() relies on elementsFromPoint(), which is
  // documented to return an empty list for points OUTSIDE the
  // current visible viewport. That's fine while drawing (the user
  // can only click visible content), but at LOAD time most strokes
  // are off-screen, so re-anchoring via elementsFromPoint silently
  // skipped them — they stayed pinned to their coarse section
  // anchors, which is exactly the "barely moves on toggle" symptom
  // the user reported.
  //
  // This helper instead walks every cached content anchor once and
  // returns the smallest-area one whose CURRENT bounding rect (in
  // document coordinates) contains the point. It works regardless
  // of scroll position. Cost is O(N_anchors) per call ≈ a few ms
  // for an entire handout's worth of strokes — only paid at load.
  //
  // We also cache the rects in a single pass keyed by the anchor
  // element so the per-stroke loop in reanchorAllStrokes() doesn't
  // recompute getBoundingClientRect() N times for the same element.
  function buildAnchorRectCache() {
    const list = getAnchorList();
    const sx = window.scrollX, sy = window.scrollY;
    const cache = [];
    for (const el of list) {
      const r = el.getBoundingClientRect();
      if (r.width <= 0 || r.height <= 0) continue;
      cache.push({
        el,
        left:   r.left + sx,
        top:    r.top  + sy,
        right:  r.left + sx + r.width,
        bottom: r.top  + sy + r.height,
        width:  r.width,
        height: r.height,
        area:   r.width * r.height,
      });
    }
    return cache;
  }

  function findSmallestContainingAnchor(rectCache, dx, dy) {
    let best = null;
    let bestArea = Infinity;
    for (const c of rectCache) {
      if (dx < c.left || dx > c.right)  continue;
      if (dy < c.top  || dy > c.bottom) continue;
      if (c.area < bestArea) { bestArea = c.area; best = c; }
    }
    return best;
  }

  // True for chapter-/section-level wrappers that contain many
  // paragraphs and therefore have huge heights. Anchoring strokes
  // to these makes them drift wildly on any in-section reflow (see
  // the long comment in reanchorStrokeAfterMove).
  function isCoarseAnchorEl(el) {
    if (!el) return true;
    const tag = el.tagName;
    if (tag === "SECTION" || tag === "ARTICLE" || tag === "MAIN" ||
        tag === "ASIDE"   || tag === "NAV"     || tag === "HEADER" ||
        tag === "FOOTER"  || tag === "BODY"    || tag === "HTML") {
      return true;
    }
    // Quarto wraps sections in <div class="section level2"> in some
    // configurations; treat those as coarse too.
    if (tag === "DIV" && el.classList && el.classList.contains("section")) {
      return true;
    }
    return false;
  }

  // Fallback for points that fall in inter-paragraph whitespace
  // (so no <p>/<li> contains them). Pick the closest fine anchor
  // by vertical distance — that's almost always the paragraph the
  // user intended to mark up.
  function findNearestFineAnchorVertically(rectCache, dx, dy, opts) {
    const mainOnly = opts && opts.mainColumnOnly;
    let best = null;
    let bestDist = Infinity;
    for (const c of rectCache) {
      if (!c.el.id || !c.el.id.startsWith(FINE_ANCHOR_PREFIX)) continue;
      if (mainOnly && isInSidebar(c.el)) continue;
      let dist;
      if (dy < c.top)         dist = c.top - dy;
      else if (dy > c.bottom) dist = dy - c.bottom;
      else                    dist = 0;
      // Tiny horizontal-out penalty so we prefer something the
      // stroke actually overlaps horizontally when distances tie.
      if (dx < c.left || dx > c.right) dist += 0.5;
      if (dist < bestDist) { bestDist = dist; best = c; }
    }
    return best;
  }

  // Migrate a v4 stroke whose anchor is too COARSE (e.g. a top-
  // level <section>) to the deepest [id]-bearing element currently
  // located at the stroke's first point. Geometry is preserved
  // exactly: every point keeps its current viewport position; we
  // just re-express it in fractional coordinates of the new, finer
  // anchor.
  //
  // Why bother: section-level anchors stretch when callouts inside
  // them are toggled open (see ensureFineAnchors). A paragraph- or
  // list-item-level anchor does not — it just translates — so the
  // stroke moves the SAME amount as the underlying text instead of
  // a small fraction of it.
  //
  // Caveats:
  //   • The "deepest" lookup is anchored to the FIRST point. If a
  //     stroke spans multiple paragraphs, later points end up with
  //     fx/fy outside [0,1] of the new anchor — fine, the stroke
  //     still renders as a rigid body translated by the first
  //     paragraph's reflow. Multi-paragraph strokes that need
  //     pixel-perfect tracking across reflows are out of scope.
  //   • If the user has already toggled callouts open BEFORE
  //     loading the JSON, the saved anchor's current rect is
  //     stretched, so the computed viewport position no longer
  //     matches where the stroke was originally drawn. In that
  //     case, re-anchoring picks the wrong paragraph. Best practice
  //     is to load before toggling — same as before this fix.
  function reanchorStrokeToFinestContainer(s, rectCache) {
    if (!s || !s.anchor || !s.anchor.id) return s;
    if (!s.points || s.points.length === 0) return s;
    const p0 = s.points[0];
    if (p0.fx === undefined) return s; // legacy unanchored — leave it
    const oldEl = document.getElementById(s.anchor.id);
    if (!oldEl) return s;
    const oldRect = oldEl.getBoundingClientRect();
    if (oldRect.width <= 0 || oldRect.height <= 0) return s;
    const oldArea = oldRect.width * oldRect.height;

    // Document-coord position of the stroke's first point.
    const dx = oldRect.left + window.scrollX + p0.fx * oldRect.width;
    const dy = oldRect.top  + window.scrollY + p0.fy * oldRect.height;

    // 1) deepest containing anchor (covers most strokes that landed
    //    on text within a paragraph).
    let pick = findSmallestContainingAnchor(rectCache, dx, dy);
    // 2) If the containing anchor is still as coarse as the saved
    //    one (e.g. the click was in inter-paragraph whitespace),
    //    fall back to the nearest fine anchor by vertical distance.
    if (!pick || pick.el === oldEl || pick.area >= oldArea) {
      pick = findNearestFineAnchorVertically(rectCache, dx, dy);
    }
    // 3) If the chosen anchor lives in the right margin sidebar
    //    (#quarto-margin-sidebar / #TOC), redirect to the closest
    //    fine anchor in the MAIN body column at the same vertical
    //    position. The stroke keeps its absolute viewport position
    //    via the fx/fy recompute below; afterward it tracks the
    //    body column rather than the sticky sidebar.
    if (pick && isInSidebar(pick.el)) {
      const main = findNearestFineAnchorVertically(
        rectCache, dx, dy, { mainColumnOnly: true }
      );
      if (main) pick = main;
    }
    if (!pick || pick.el === oldEl) return s;
    if (pick.area >= oldArea && !isInSidebar(oldEl)) return s;

    return {
      ...s,
      v: 4,
      anchor: {
        id: pick.el.id,
        savedWidth:  pick.width,
        savedHeight: pick.height,
      },
      points: s.points.map((p) => {
        const px = oldRect.left + window.scrollX + p.fx * oldRect.width;
        const py = oldRect.top  + window.scrollY + p.fy * oldRect.height;
        return {
          fx: (px - pick.left) / pick.width,
          fy: (py - pick.top)  / pick.height,
          p: p.p,
        };
      }),
    };
  }

  // Compute current document-coord points for a stroke, using its
  // anchor's CURRENT bounding rect. Returns [] if the stroke is
  // unanchored or its anchor is missing / collapsed.
  //
  // Used by bakeErasersIntoStrokes to compare eraser paths against
  // pen/highlighter paths in a coordinate system that both share
  // (so layout drift between save and load doesn't matter, as long
  // as both anchors moved similarly — which they do when they're
  // the same anchor or near each other in the same column).
  function strokeDocPoints(s) {
    if (!s || !s.points || s.points.length === 0) return [];
    if (s.points[0].fx === undefined) {
      return s.points.map(p => ({ x: p.x, y: p.y }));
    }
    if (!s.anchor || !s.anchor.id) return [];
    const el = document.getElementById(s.anchor.id);
    if (!el) return [];
    const r = el.getBoundingClientRect();
    if (r.width <= 0 || r.height <= 0) return [];
    const sx = window.scrollX, sy = window.scrollY;
    return s.points.map(p => ({
      x: r.left + sx + p.fx * r.width,
      y: r.top  + sy + p.fy * r.height,
    }));
  }

  function pointsBBox(pts) {
    if (!pts || pts.length === 0) return null;
    let l = Infinity, t = Infinity, r = -Infinity, b = -Infinity;
    for (const p of pts) {
      if (p.x < l) l = p.x;
      if (p.y < t) t = p.y;
      if (p.x > r) r = p.x;
      if (p.y > b) b = p.y;
    }
    return { l, t, r, b };
  }

  // Squared distance from point (px, py) to the line segment (ax,ay)→(bx,by).
  function pointToSegmentDistSq(px, py, ax, ay, bx, by) {
    const vx = bx - ax, vy = by - ay;
    const wx = px - ax, wy = py - ay;
    const c1 = vx * wx + vy * wy;
    if (c1 <= 0) return wx * wx + wy * wy;
    const c2 = vx * vx + vy * vy;
    if (c2 <= c1) {
      const dx = px - bx, dy = py - by;
      return dx * dx + dy * dy;
    }
    const t = c1 / c2;
    const projx = ax + t * vx, projy = ay + t * vy;
    const dx = px - projx, dy = py - projy;
    return dx * dx + dy * dy;
  }

  // Bake each eraser stroke into the prior pen/highlighter strokes
  // (vector erase), then drop the eraser strokes from the array.
  //
  // Why: at render time, eraser strokes use canvas globalComposite-
  // Operation = "destination-out", which silently wipes any pixels
  // currently underneath. After save → load, both pens and erasers
  // get re-anchored independently and reflow drift can move an
  // eraser onto pens it was never meant to touch — and worse, any
  // pen the user drags into the eraser's swept area later in the
  // session vanishes the moment they let go (confirmed via
  // Option+E: turning eraser rendering off restored every "hidden"
  // stroke immediately).
  //
  // Algorithm (preserves the original draw timeline):
  //   • Walk strokes in saved order.
  //   • For each eraser, mark the points of every prior pen /
  //     highlighter stroke that fall within eraser_width/2 of any
  //     segment of the eraser path (in current doc coords).
  //   • Drop those points; if a stroke has no points left, drop it.
  //   • Drop the eraser stroke itself.
  //
  // The result is a clean, vector-only stroke list with the user's
  // intent (which marks should stay erased) baked in. Subsequent
  // saves naturally write a clean file.
  function bakeErasersIntoStrokes(strokes) {
    const docs = strokes.map(strokeDocPoints);
    const bbs  = docs.map(pointsBBox);
    let erasersFound = 0;
    let pointsRemoved = 0;

    for (let i = 0; i < strokes.length; i++) {
      const s = strokes[i];
      if (!s || s.tool !== 'eraser') continue;
      erasersFound++;
      const erasePts = docs[i];
      const eraseBb  = bbs[i];
      if (!eraseBb || erasePts.length === 0) continue;
      const r  = (s.width || 4) / 2;
      const r2 = r * r;
      const ebbX = { l: eraseBb.l - r, t: eraseBb.t - r,
                     r: eraseBb.r + r, b: eraseBb.b + r };

      for (let j = 0; j < i; j++) {
        const p = strokes[j];
        if (!p || p.tool === 'eraser') continue;
        if (!p.points || p.points.length === 0) continue;
        const penPts = docs[j];
        const penBb  = bbs[j];
        if (!penPts || penPts.length === 0 || !penBb) continue;
        // Quick reject: skip pens whose bbox doesn't overlap the
        // expanded eraser bbox.
        if (penBb.r < ebbX.l || penBb.l > ebbX.r ||
            penBb.b < ebbX.t || penBb.t > ebbX.b) continue;

        const keepIdx = [];
        for (let k = 0; k < penPts.length; k++) {
          const px = penPts[k].x, py = penPts[k].y;
          let erased = false;
          // First check: distance to any eraser POINT (cheap, catches
          // most cases since eraser paths are densely sampled).
          for (let l = 0; l < erasePts.length; l++) {
            const dx = px - erasePts[l].x;
            const dy = py - erasePts[l].y;
            if (dx * dx + dy * dy < r2) { erased = true; break; }
          }
          // Second check: distance to any eraser SEGMENT (catches
          // cases where the eraser stroke has long sparse segments).
          if (!erased) {
            for (let l = 1; l < erasePts.length; l++) {
              const a = erasePts[l - 1], b = erasePts[l];
              if (pointToSegmentDistSq(px, py, a.x, a.y, b.x, b.y) < r2) {
                erased = true; break;
              }
            }
          }
          if (erased) pointsRemoved++;
          else keepIdx.push(k);
        }

        if (keepIdx.length !== p.points.length) {
          p.points = keepIdx.map(k => p.points[k]);
          // Refresh cached doc points / bbox for the trimmed stroke
          // so that any LATER eraser in this same pass sees the
          // up-to-date geometry.
          docs[j] = strokeDocPoints(p);
          bbs[j]  = pointsBBox(docs[j]);
        }
      }
    }

    // Drop erasers and now-empty pens.
    const out = [];
    for (let i = 0; i < strokes.length; i++) {
      const s = strokes[i];
      if (!s) continue;
      if (s.tool === 'eraser') continue;
      if (s.points && s.points.length === 0) continue;
      out.push(s);
    }
    return out;
  }

  // Convert any loaded stroke into v4-fractional in-memory format
  // so the rest of the app only deals with one shape:
  //   • Already v4 → kept as-is.
  //   • v3 (anchor + saved doc-coords + saved width/height) →
  //     compute (fx, fy) = (p.x - anchor.left)/anchor.width,
  //                         (p.y - anchor.top)/anchor.height
  //     using the SAVED anchor rect so the conversion is exact and
  //     does NOT depend on the current layout.
  //   • v3 missing width/height → unfortunately ambiguous; treat
  //     as legacy unanchored.
  //   • v2 unanchored → kept as-is; rendered via doc-coord fallback.
  function realignStrokesToCurrentDocument(data) {
    const strokesIn = Array.isArray(data.strokes) ? data.strokes : [];
    if (strokesIn.length === 0) return [];

    let v4Count = 0, v3to4 = 0, missing = 0, unanchored = 0;
    const out = [];
    for (const s of strokesIn) {
      const isFractional = s.points && s.points.length > 0
                        && s.points[0].fx !== undefined;
      if (s.v === 4 || isFractional) {
        v4Count++;
        out.push({ ...s, v: 4 });
        continue;
      }
      // v3 with full anchor (top/left/width/height + doc-coord points)
      if (s.anchor && s.anchor.id
          && typeof s.anchor.left === "number" && typeof s.anchor.top === "number"
          && s.anchor.width > 0 && s.anchor.height > 0
          && s.points && s.points.length > 0
          && s.points[0].x !== undefined) {
        const aL = s.anchor.left, aT = s.anchor.top;
        const aW = s.anchor.width, aH = s.anchor.height;
        out.push({
          v: 4,
          tool: s.tool, color: s.color, width: s.width,
          anchor: { id: s.anchor.id, savedWidth: aW, savedHeight: aH },
          points: s.points.map(p => ({
            fx: (p.x - aL) / aW,
            fy: (p.y - aT) / aH,
            p: p.p,
          })),
        });
        v3to4++;
        continue;
      }
      if (s.anchor && s.anchor.id) {
        missing++;  // v3-ish but missing dimensions; skip the conversion
      } else {
        unanchored++;
      }
      // Keep as legacy unanchored — render via the doc-coord fallback.
      out.push(s);
    }
    if (window.console) {
      console.info(
        "[annotation v4] Loaded v" + (data.version || "?") + ": " +
        "v4=" + v4Count + " v3→v4=" + v3to4 +
        " v3-no-dims=" + missing + " unanchored=" + unanchored
      );
      if (missing > 0 || unanchored > 0) {
        console.info(
          "[annotation v4] Strokes without enough info to convert " +
          "render at raw saved coords (zoom-fragile). Save .json on " +
          "the original layout to upgrade them to v4."
        );
      }
    }

    // ── Re-anchor pass: migrate coarse (section-level) anchors to
    // the deepest synthetic / content anchor at each stroke's
    // current document-coord position. We build the anchor rect
    // cache ONCE up front (one getBoundingClientRect per anchor)
    // and reuse it across all strokes — see
    // reanchorStrokeToFinestContainer for the per-stroke geometry-
    // preserving construction. Document-coord lookup is required
    // because most strokes are off-screen at load time, and
    // elementsFromPoint() returns nothing for off-screen points.
    // ── Eraser bake: convert eraser strokes into vector edits of
    // the prior pen/highlighter strokes, then drop them from the
    // array. Why this is necessary:
    //
    //   The canvas renderer applies erasers via globalComposite-
    //   Operation = "destination-out", which erases ANY pixels
    //   currently underneath. After save → load, both pens and
    //   erasers are re-anchored independently. Layout drift
    //   (MathJax late render, callout state, font swap) shifts
    //   anchors by varying amounts, so an eraser saved over pen A
    //   can end up rendering over pen B. Worse, when the user
    //   moves a stroke into an eraser's swept area, the eraser
    //   silently wipes it out — exactly the "moved strokes hide
    //   behind the math formula" symptom (confirmed: with all
    //   erasers disabled via Option+E, every stroke became
    //   visible immediately).
    //
    // Baking at load time fixes this by:
    //   1. Walking strokes in their saved order (so semantics match
    //      the original draw timeline).
    //   2. For every eraser, removing the points of every prior
    //      pen/highlighter stroke that fall within eraser_width/2
    //      in CURRENT doc coords.
    //   3. Dropping the eraser stroke and any pen left with no
    //      points.
    //
    // Saved files written from this point on naturally contain no
    // eraser strokes (they were already baked into the survivors),
    // so re-saving migrates the file forward.
    const erasersInInput = out.filter(s => s && s.tool === 'eraser').length;
    const bakedOut = bakeErasersIntoStrokes(out);
    if (window.console && erasersInInput > 0) {
      const survivedPen = bakedOut.filter(s => s && s.tool !== 'eraser').length;
      console.info(
        "[annotation v4] Baked " + erasersInInput + " eraser stroke(s) " +
        "into prior pen/highlighter strokes; " + survivedPen +
        " stroke(s) remain (was " + out.length + "). " +
        "Re-saving will write a clean file with no eraser strokes."
      );
    }
    out.length = 0;
    for (const s of bakedOut) out.push(s);

    const rectCache = buildAnchorRectCache();
    let migrated = 0;
    const finalOut = out.map((s) => {
      const finer = reanchorStrokeToFinestContainer(s, rectCache);
      if (finer !== s) migrated++;
      return finer;
    });
    if (migrated > 0 && window.console) {
      console.info(
        "[annotation v4] Re-anchored " + migrated + "/" + out.length +
        " stroke(s) to finer (paragraph / list-item / summary) " +
        "anchors. They now translate with the underlying content " +
        "when other callouts expand or collapse."
      );
    }
    return finalOut;
  }

  // Browsers do not allow JS to point a file picker at an arbitrary
  // directory (security: a page must not peek into your filesystem).
  // The closest we can do:
  //   * Modern browsers on https / localhost  →  File System Access API
  //     with an `id` derived from this document's path. After the user
  //     picks once, the browser remembers that directory and reopens it
  //     next time on THIS handout.
  //   * Safari / Firefox / file://             →  fall back to the
  //     hidden <input type=file>, which most browsers also remember.
  // First-time default is the Downloads folder, which is where Save
  // .json writes to.
  async function pickAndLoad() {
    const fileInput = document.querySelector("#annotation-toolbar input[type=file]");
    if (typeof window.showOpenFilePicker === "function") {
      try {
        // NOTE: this id is intentionally allowed to exceed the
        // browser's 32-char cap on long paths so that the call
        // throws and we fall through to the <input type=file>
        // path below — that fallback inherits Chrome's per-origin
        // "last folder used" memory, which is the UX the user
        // depends on day-to-day. (A short stable id would make
        // showOpenFilePicker succeed but each first-open would
        // start in Downloads instead of the most recent folder.)
        const id = "annotation-load-"
          + location.pathname.replace(/[^a-zA-Z0-9]+/g, "-").slice(0, 32);
        const [handle] = await window.showOpenFilePicker({
          id,
          startIn: "downloads",
          multiple: false,
          types: [{
            description: "Annotation JSON",
            accept: { "application/json": [".json"] },
          }],
        });
        const file = await handle.getFile();
        loadJson(file);
        return;
      } catch (err) {
        if (err && err.name === "AbortError") return; // user cancelled
        console.warn("showOpenFilePicker failed, falling back to <input type=file>", err);
      }
    }
    if (fileInput) fileInput.click();
  }

  function onKeyDown(e) {
    if (e.altKey && (e.key === "a" || e.key === "A")) {
      e.preventDefault();
      setEnabled(!enabled);
      return;
    }
    if (e.altKey && (e.key === "t" || e.key === "T")) {
      e.preventDefault();
      const visible = toolbar && toolbar.style.display !== "none";
      setToolbarVisible(!visible);
      return;
    }
    if (!enabled) return;
    // Avoid stealing keys while the user is typing in an input.
    const tgt = e.target;
    const inField = tgt && (tgt.tagName === "INPUT" ||
                            tgt.tagName === "TEXTAREA" ||
                            tgt.isContentEditable);
    if ((e.metaKey || e.ctrlKey) && e.key === "z") {
      e.preventDefault(); undo();
    } else if (!inField && (e.key === "c" || e.key === "C")) {
      setTool("cursor");
    } else if (!inField && (e.key === "p" || e.key === "P")) {
      setTool("pen");
    } else if (!inField && (e.key === "h" || e.key === "H")) {
      setTool("highlighter");
    } else if (!inField && (e.key === "s" || e.key === "S")) {
      setTool("select");
    } else if (!inField && (e.key === "e" || e.key === "E")) {
      setTool("eraser");
    } else if ((e.key === "Delete" || e.key === "Backspace")
               && tool === "select" && selectedStrokes.size > 0) {
      e.preventDefault();
      deleteSelected();
    } else if (e.key === "Escape") {
      // In select mode, Esc clears the active selection first;
      // a second Esc (now with empty selection) turns annotation off.
      if (tool === "select" && selectedStrokes.size > 0) {
        clearSelection();
      } else {
        setEnabled(false);
      }
    }
  }

  function init() {
    if (document.getElementById("annotation-canvas")) return;
    if (window.console) {
      console.info(
        "[annotation v4] init — anchor-relative fractional " +
        "coordinates active."
      );
    }
    canvas = makeCanvas();
    resizeCanvas();
    toolbar = makeToolbar();
    showBtn = makeShowButton();
    getOverlayHost().appendChild(showBtn);
    // Restore previous position + visibility (if any).
    restoreToolbarPosition();
    restoreToolbarVisibility();
    setTool("pen");

    // Assign synthetic ids to <p> / <li> / <summary> / etc. BEFORE
    // any stroke is loaded or drawn, so both load-time re-anchoring
    // and live findContainingAnchor() calls land on paragraph-level
    // anchors instead of whole sections.
    ensureFineAnchors();

    canvas.addEventListener("pointerdown", onPointerDown);
    canvas.addEventListener("pointermove", onPointerMove);
    canvas.addEventListener("pointerup", onPointerUp);
    canvas.addEventListener("pointercancel", onPointerUp);

    // Per-pointer-type touch-action policy (Surface / iPad pens):
    // The CSS `touch-action` property is per-element, not per-pointer-
    // type, so we can't statically allow "touch scrolls but pen
    // draws". Instead we exploit the fact that active stylus pens
    // (Surface Pen, Apple Pencil, etc.) emit `pointerover` /
    // `pointerenter` while still HOVERING above the screen, before
    // they make contact. We use that proximity window to flip the
    // canvas' touch-action to "none", so when the pen finally touches
    // down the browser doesn't pre-empt the gesture as a vertical
    // pan. As soon as the pen leaves proximity we restore the touch-
    // friendly default so finger swipes scroll the page again.
    canvas.addEventListener("pointerenter", (e) => {
      if (e.pointerType === "pen") {
        canvas.style.touchAction = "none";
      }
    });
    canvas.addEventListener("pointerleave", (e) => {
      if (e.pointerType === "pen") {
        canvas.style.touchAction = "pan-y pinch-zoom";
      }
    });
    window.addEventListener("resize", () => {
      resizeCanvas();
      clampToolbarPosition();
    });
    // Browser page-zoom doesn't always fire `resize` on `window`,
    // but it does notify VisualViewport — listen there too so v4
    // strokes immediately re-render at the new zoom level.
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", () => {
        resizeCanvas();
        clampToolbarPosition();
      });
    }
    window.addEventListener("keydown", onKeyDown);
    // Re-render whenever the user scrolls so strokes appear locked to
    // the underlying page content.
    let scrollRaf = 0;
    window.addEventListener("scroll", () => {
      if (scrollRaf) return;
      scrollRaf = requestAnimationFrame(() => {
        scrollRaf = 0;
        if (canvas.style.display !== "none") redraw();
      });
    }, { passive: true });

    // ── Layout-change reflow handling ──────────────────────────────
    // Opening or closing a Quarto callout (collapsible <details>),
    // an image finishing to load, a font swap, etc. all reflow the
    // page WITHOUT firing scroll / resize. v4 strokes are anchored
    // to specific [id] elements via fractional coordinates, so they
    // would render correctly IF we redrew — but the canvas only
    // refreshed on scroll/resize, leaving notes for content BELOW
    // the change visibly out of sync with the underlying anchors.
    //
    // Fix: observe layout changes and trigger a coalesced redraw.
    //   • ResizeObserver on document.body catches the typical case
    //     (a toggle expanding pushes total page height up / down).
    //   • A capture-phase `toggle` listener catches <details> opens
    //     immediately, even before ResizeObserver delivers the
    //     resulting size change.
    // Both schedule the same rAF so we only paint once per frame.
    //
    // Note re: backward compatibility — the JSON format is untouched
    // (same v4 anchor + fx/fy strokes); this only changes WHEN we
    // redraw, not WHAT we draw, so previously saved annotations keep
    // working as-is.
    let layoutRaf = 0;
    const scheduleLayoutRedraw = () => {
      if (layoutRaf) return;
      layoutRaf = requestAnimationFrame(() => {
        layoutRaf = 0;
        // The set of [id]-bearing elements may change when Quarto
        // injects/removes nodes (rare, but cheap to invalidate).
        anchorListCache = null;
        if (canvas && canvas.style.display !== "none") redraw();
      });
    };
    if (typeof ResizeObserver !== "undefined") {
      try {
        const layoutObserver = new ResizeObserver(scheduleLayoutRedraw);
        layoutObserver.observe(document.body);
      } catch (_) {
        // Older engines: silently skip; toggle listener still helps.
      }
    }
    // `toggle` does not bubble, so we listen in the capture phase to
    // catch every <details> on the page (callouts, code-folding, etc.)
    // without having to attach individually.
    document.addEventListener("toggle", scheduleLayoutRedraw, true);

    // Diagnostic: warn (once) if any ancestor of the canvas creates
    // a stacking context. That's the only realistic way our INT32_MAX
    // z-index can still leave strokes "behind" page content.
    warnIfStackingAncestor();

    autoLoadJsonIfConfigured();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

<!--
  annotation-v4.html — Pen-tablet annotation overlay for Quarto HTML
  -----------------------------------------------------------------
  Experimental v4 layout-relative variant of annotation.html.
  Currently injected via per-document YAML override on
  4th-handout.qmd; other handouts continue to use annotation.html.

  WHAT'S NEW IN v4 (vs v3 in annotation.html)
  -------------------------------------------
  Storage format: each stroke point is stored as fractional
  coordinates (fx, fy) ∈ [0, 1]² *inside* the smallest [id]-bearing
  ancestor element at the draw point. At render time we look up the
  anchor by id, get its current getBoundingClientRect(), and compute:

      viewport_x = anchor.left + fx * anchor.width
      viewport_y = anchor.top  + fy * anchor.height

  Why this is the right primitive (per W3C/PDF.js community
  consensus — see 2026 search "html canvas annotation overlay
  browser zoom relative coordinates"):
    • Browser page-zoom: anchor.width / .height scale uniformly,
      so (fx, fy) maps to the correct visual location automatically.
      No scale factor to compute.
    • Stroke thickness ALSO scales with zoom:
          lineWidth = savedWidth * (currentAnchorWidth / savedAnchorWidth)
      → notes feel like part of the underlying document content.
    • Window resize / responsive reflow: anchor reflows with content;
      the fractional location stays meaningful.
    • Cross-machine font drift: anchor's aspect ratio may shift
      slightly (e.g. text wraps to one extra line), which stretches
      strokes proportionally — best-effort but tolerant.

  Backward compatibility
  ----------------------
    • Loading a v3 JSON: in-memory conversion to v4 happens at load
      time (anchor.left/top + width/height + saved doc-coords →
      fractional). No re-save needed for the strokes to render
      correctly.
    • Loading a v2 JSON (legacy unanchored): rendered as raw
      doc-coords (zoom-fragile); the next Save .json upgrades them
      to v4 if anchors can be found.
    • Saved files are always v4.

  • Vanilla JS only (no external dependencies)
  • Pointer Events API (mouse / pen / touch all unified)
  • Toolbar: cursor / pen / highlighter / eraser / color / width /
    undo / clear / save / load
  • Toggle ON/OFF: when OFF, scrolling and clicks pass through normally
  • Cursor tool: keeps annotation mode ON (existing strokes stay
    visible) but lets the page handle pointer events again so the
    user can scroll, click links, use the TOC, etc.
  • Toolbar is draggable via the ⋮⋮ grip; can be hidden via the ✕
    button (a small ✏ launcher appears at top-right while hidden).
    Position and visibility persist across reloads via localStorage.
  • Tested on Chrome / Edge (Mac & Windows)
  Keyboard shortcuts (when ON unless noted):
      Alt+A             toggle annotation mode (works also when OFF)
      Alt+T             toggle TOOLBAR visibility (works also when OFF)
      C / P / H / E     select cursor / pen / highlighter / eraser
      Cmd/Ctrl+Z        undo
      Esc               turn annotation OFF
-->
<script>
(function () {
  "use strict";

  // ── Coexistence with annotation.html (v3) ─────────────────────
  // Quarto's include-after-body MERGES project-level and document-
  // level entries (rather than replacing), so when a handout opts
  // into v4 via document YAML, BOTH annotation.html and
  // annotation-v4.html end up injected. Without coordination, v3
  // would create #annotation-canvas first and v4's init() would
  // bail (its existing guard is `if (#annotation-canvas) return`).
  //
  // The fix: we set this flag synchronously as v4's IIFE runs.
  // annotation.html (v3) was patched to defer its init to a
  // microtask and bail when this flag is set, so v4 wins on any
  // page that loads both files.
  window.__ANNOTATION_V4_ACTIVE__ = true;

  const COLORS = [
    { name: "black",  value: "#111827" },
    { name: "red",    value: "#dc2626" },
    { name: "blue",   value: "#2563eb" },
    { name: "green",  value: "#059669" },
    { name: "yellow", value: "#facc15" },
  ];
  const WIDTHS = [
    { name: "thin",     value: 2 },
    { name: "medium",   value: 4 },
    { name: "thick",    value: 8 },
    { name: "x-large",  value: 16 },
    { name: "huge",     value: 32 },
    { name: "giant",    value: 56 },
  ];
  // "cursor" is a non-drawing tool: it keeps annotation mode ON
  // (existing strokes stay visible) but lets the page receive pointer
  // events again, so the user can scroll, click links, use the TOC,
  // etc. without first turning annotation OFF.
  // "select" is a manipulation tool: drag a marquee to select existing
  // strokes, then drag the selection to MOVE or drag a corner/edge
  // handle to RESIZE. Delete/Backspace removes the selection, Esc
  // clears it. See the "Selection / move / resize" section below for
  // implementation details.
  const TOOLS = ["cursor", "pen", "highlighter", "select", "eraser"];

  // Default stroke width for each tool (must be a value present in WIDTHS).
  // "cursor" / "select" intentionally have no entry — switching to
  // them leaves the previously selected width unchanged.
  const DEFAULT_WIDTH = {
    pen: 4,
    highlighter: 16,
    eraser: 32,
  };
  // Highlighter: how transparent strokes should look.
  const HIGHLIGHTER_ALPHA = 0.35;

  // localStorage keys (versioned in case the format changes later).
  const STORAGE_POS_KEY = "annotation-toolbar-pos-v1";
  const STORAGE_VIS_KEY = "annotation-toolbar-visible-v1";

  let enabled = false;
  let tool = "pen";
  let color = COLORS[0].value;
  let width = DEFAULT_WIDTH.pen;
  let drawing = false;
  let strokes = [];
  let currentStroke = null;
  let canvas, ctx, toolbar;
  // The small "✏" launcher that re-opens the toolbar after it has been
  // hidden via the ✕ button or Alt+T.
  let showBtn = null;
  // Drag state for moving the toolbar around the viewport.
  let toolbarDragging = false;
  let toolbarDragStartClient = null;
  let toolbarDragStartLeft = 0;
  let toolbarDragStartTop = 0;
  // Per-tool color memory: switching tools restores the last color used
  // with that tool. Pen defaults to black, highlighter to yellow.
  // Cursor is non-drawing → ignores color.
  const TOOL_COLOR = {
    cursor: null,                 // cursor ignores color
    pen: COLORS[0].value,         // black
    highlighter: COLORS[4].value, // yellow
    select: null,                 // select ignores color
    eraser: null,                 // eraser ignores color
  };

  // ── Selection / move / resize state ────────────────────────────
  // Used only by the "select" tool. The selection holds references
  // to existing entries in `strokes[]`, plus a per-drag snapshot of
  // each stroke's points in VIEWPORT coordinates. We compute the
  // new viewport position from that snapshot on every pointermove
  // and re-express the result in the stroke's anchor frame, so we
  // never accumulate floating-point drift across many small moves.
  let selectedStrokes = new Set();   // Set<stroke ref>
  let selectionMode = null;          // null|"marquee"|"moving"|"resizing"
  let marqueeRect = null;            // {x0,y0,x1,y1} viewport coords
  let dragOriginClient = null;       // {x,y} pointer at drag start
  let dragStartBBox = null;          // {left,top,right,bottom,width,height}
  let dragSnapshot = null;           // Map<stroke,{anchorId,points,width,...}>
  let resizeHandle = null;           // "nw"|"n"|"ne"|"e"|"se"|"s"|"sw"|"w"
  const SELECTION_HANDLE_RADIUS = 5;   // visual radius of corner/edge dot
  const SELECTION_HANDLE_HIT_PX = 12;  // generous hit slop for pen tip

  function el(tag, props = {}, children = []) {
    const node = document.createElement(tag);
    Object.entries(props).forEach(([k, v]) => {
      if (k === "style") Object.assign(node.style, v);
      else if (k.startsWith("on")) node.addEventListener(k.slice(2), v);
      else node.setAttribute(k, v);
    });
    (Array.isArray(children) ? children : [children]).forEach(c => {
      if (c == null) return;
      node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    });
    return node;
  }

  function makeCanvas() {
    const c = el("canvas", {
      id: "annotation-canvas",
      style: {
        position: "fixed",
        top: "0",
        left: "0",
        // Width/height are set in JS (resizeCanvas) so we can use
        // documentElement.clientWidth/Height — which EXCLUDES the
        // browser scrollbar. Why this matters: with touch-action:
        // none, Edge on Windows touch devices renders a "no-scroll
        // here" hint (the scrollbar appears dashed/ghosted) on any
        // touch-action:none element that overlaps the scrollbar
        // area. Keeping the canvas inside the content area only
        // leaves the scrollbar fully solid and interactable.
        //
        // z-index: 2147483647 = INT32_MAX. Highest value any CSS
        // engine accepts. We DELIBERATELY tie with the toolbar's
        // z-index (also 2147483647) and rely on DOM order to keep
        // the toolbar visually above the canvas: the toolbar is
        // appended to <body> AFTER the canvas inside init(), so
        // for ties later DOM wins. Same trick keeps both above any
        // page content that might also try to claim INT32_MAX.
        zIndex: "2147483647",
        pointerEvents: "none",
        // Default touch-action allows the page to be scrolled (pan-y)
        // and pinch-zoomed with the user's finger even while a drawing
        // tool is active. We then dynamically downgrade to "none" for
        // the brief window where a pen pointer is in proximity to the
        // canvas (see pointerenter/pointerleave handlers in init), so
        // that vertical pen strokes can't be hijacked by the browser
        // as a scroll gesture on Surface-class devices.
        //
        // Pointer-type policy:
        //   • pen   → drawing (touch-action flips to "none" via hover)
        //   • mouse → drawing (touch-action does not gate mouse)
        //   • touch → scroll / pinch-zoom (filtered out of drawing
        //             handlers by isDrawingPointer)
        touchAction: "pan-y pinch-zoom",
        background: "transparent",
        cursor: "crosshair",
        display: "none",
        // Suppress any user-agent focus outline; the canvas can be
        // implicitly focused while drawing on some browsers and a
        // dashed outline at the viewport edge is visually distracting.
        outline: "none",
      },
    });
    getOverlayHost().appendChild(c);
    return c;
  }

  // ── Overlay host: mount above <body>, not inside it ────────────
  // We append the canvas / toolbar / show-button to the <html>
  // element instead of <body>. Two reasons:
  //
  //   1. <body> is itself a single descendant of <html>, so
  //      anything inside body — no matter how nested or how high
  //      its z-index — is stacked at body's level (z-index auto =
  //      0) within the ROOT stacking context. By living as a
  //      *sibling* of <body>, our canvas competes at the root
  //      level too, with its own INT32_MAX z-index, and is
  //      therefore guaranteed to render above every body subtree
  //      regardless of nested transform / filter / isolation
  //      stacking contexts inside body.
  //
  //   2. <body> is a frequent target for runtime DOM injection
  //      (MathJax helpers, modal portals, agent toolbars, etc.).
  //      Even with z-index ties resolved by DOM order, those
  //      siblings created AFTER us would cover our overlay until
  //      the next redraw moved us back. Mounting outside <body>
  //      side-steps the whole class of issues.
  //
  // Browsers accept additional element children of <html> beyond
  // <head> and <body>; the canvas is purely visual and the
  // toolbar/show-button stay fully interactive (event listeners,
  // localStorage state, drag, keyboard shortcuts all unchanged).
  function getOverlayHost() {
    return document.documentElement;
  }

  // ── Keep our overlay above any later-injected DOM ──────────────
  // Even when mounted to <html>, *some* pages append further
  // siblings (e.g. browser-extension overlays). On every redraw,
  // ensure the canvas → toolbar → showBtn trio sits at the end of
  // the host (and in that DOM order) so the toolbar wins the tie
  // against the canvas (DOM-order rule for ties), and both win
  // against anything else at the same z-index. No-op when already
  // in the right position.
  function ensureOverlayOnTop() {
    const host = getOverlayHost();
    if (!canvas || !host) return;
    const expected = [canvas];
    if (toolbar) expected.push(toolbar);
    if (showBtn) expected.push(showBtn);
    // Skip cheaply if nothing has changed: the last N children of
    // host should already match `expected` in order.
    const kids = host.children;
    let alreadyOk = (kids.length >= expected.length);
    if (alreadyOk) {
      const offset = kids.length - expected.length;
      for (let i = 0; i < expected.length; i++) {
        if (kids[offset + i] !== expected[i]) { alreadyOk = false; break; }
      }
    }
    if (alreadyOk) return;
    for (const el of expected) host.appendChild(el);
  }

  // Diagnostic: warn once if any ancestor of the canvas creates a
  // stacking context that would trap our overlay below sibling
  // page content. transform / filter / will-change: transform /
  // perspective / contain: paint / etc. all turn `position:fixed`
  // descendants from "viewport-relative + root stacking" into
  // "ancestor-relative + nested stacking", which is the textbook
  // way for highly z-indexed overlays to nevertheless render
  // BEHIND nearby page elements.
  let _stackingAncestorWarned = false;
  function warnIfStackingAncestor() {
    if (_stackingAncestorWarned || !canvas || !window.getComputedStyle) return;
    let el = canvas.parentElement;
    while (el && el !== document.documentElement) {
      const cs = getComputedStyle(el);
      const offenders = [];
      if (cs.transform && cs.transform !== "none")           offenders.push("transform=" + cs.transform);
      if (cs.filter && cs.filter !== "none")                 offenders.push("filter=" + cs.filter);
      if (cs.backdropFilter && cs.backdropFilter !== "none") offenders.push("backdrop-filter=" + cs.backdropFilter);
      if (cs.perspective && cs.perspective !== "none")       offenders.push("perspective=" + cs.perspective);
      if (cs.willChange && /transform|filter|perspective/.test(cs.willChange))
        offenders.push("will-change=" + cs.willChange);
      if (cs.contain && /paint|layout/.test(cs.contain))     offenders.push("contain=" + cs.contain);
      if (offenders.length) {
        _stackingAncestorWarned = true;
        if (window.console) {
          console.warn(
            "[annotation v4] Ancestor with stacking-context CSS — " +
            "the annotation canvas may render BEHIND nearby content. " +
            "Element:", el, "\nOffending properties:", offenders.join(", ")
          );
        }
        return;
      }
      el = el.parentElement;
    }
  }

  function resizeCanvas() {
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    // documentElement.clientWidth/Height = viewport CSS px MINUS
    // the browser scrollbar (when it's present). We deliberately
    // do not use window.innerWidth/innerHeight here because those
    // include the scrollbar area on Chrome / Edge, which would
    // cause the canvas to overlap it (see makeCanvas comment).
    const cssW = document.documentElement.clientWidth;
    const cssH = document.documentElement.clientHeight;
    canvas.style.width  = cssW + "px";
    canvas.style.height = cssH + "px";
    canvas.width  = Math.floor(cssW * dpr);
    canvas.height = Math.floor(cssH * dpr);
    ctx = canvas.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    redraw();
  }

  // ──────────────────────────────────────────────────────────────
  // NOTE: a large debug instrumentation block (z-order / display-
  // math / toolbar / render-coverage audits, build-marker, Option+D
  // bbox overlay, Option+E disable-eraser toggle, runtime log POST
  // helper) used to live here. It was removed after the 2026-05-16
  // eraser-bake fix landed. See
  //   2026/010_materials/annotation-v4.README.md  (§3 + §4)
  // for the full hypothesis log and copy-pasteable templates to
  // re-instrument when debugging resumes.
  // ──────────────────────────────────────────────────────────────

  function redraw() {
    if (!ctx) return;
    // Some pages dynamically append children to <body> after we've
    // initialized (MathJax containers, modal portals, third-party
    // overlays). Re-pin our canvas + toolbar to the END of <body>
    // so they keep winning the z-index tiebreaker. Cheap when no-op.
    ensureOverlayOnTop();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // Per-redraw cache of anchor positions: at most one
    // getBoundingClientRect per unique anchor id. Browser zoom or
    // window resize will fire a fresh redraw, so the cache always
    // reflects the current layout.
    const anchorCache = new Map();
    for (const s of strokes) {
      drawStroke(s, anchorCache);
    }
    drawSelectionOverlay(anchorCache);
  }

  // ── Selection geometry helpers ─────────────────────────────────
  // Compute the viewport-coords bounding box of a single stroke,
  // re-using the per-redraw anchor rect cache.
  function strokeViewportBBox(s, anchorCache) {
    if (!s || !s.points || s.points.length === 0) return null;
    const p0 = s.points[0];
    let r = null;
    if (p0.fx === undefined) {
      // Legacy (v2) unanchored — points already in doc coords.
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const p of s.points) {
        const vx = p.x - window.scrollX;
        const vy = p.y - window.scrollY;
        if (vx < minX) minX = vx;
        if (vy < minY) minY = vy;
        if (vx > maxX) maxX = vx;
        if (vy > maxY) maxY = vy;
      }
      return { left: minX, top: minY, right: maxX, bottom: maxY };
    }
    if (!s.anchor || !s.anchor.id) return null;
    if (anchorCache && anchorCache.has(s.anchor.id)) {
      r = anchorCache.get(s.anchor.id);
    } else {
      const el = document.getElementById(s.anchor.id);
      if (el) {
        const rect = el.getBoundingClientRect();
        if (rect.width > 0 && rect.height > 0) {
          r = { left: rect.left, top: rect.top, width: rect.width, height: rect.height };
        }
      }
      if (anchorCache) anchorCache.set(s.anchor.id, r);
    }
    if (!r) return null;
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of s.points) {
      const vx = r.left + p.fx * r.width;
      const vy = r.top  + p.fy * r.height;
      if (vx < minX) minX = vx;
      if (vy < minY) minY = vy;
      if (vx > maxX) maxX = vx;
      if (vy > maxY) maxY = vy;
    }
    return { left: minX, top: minY, right: maxX, bottom: maxY };
  }

  function getSelectionViewportBBox() {
    if (!selectedStrokes || selectedStrokes.size === 0) return null;
    const cache = new Map();
    let left = Infinity, top = Infinity, right = -Infinity, bottom = -Infinity;
    for (const s of selectedStrokes) {
      const b = strokeViewportBBox(s, cache);
      if (!b) continue;
      if (b.left   < left)   left   = b.left;
      if (b.top    < top)    top    = b.top;
      if (b.right  > right)  right  = b.right;
      if (b.bottom > bottom) bottom = b.bottom;
    }
    if (left === Infinity) return null;
    return { left, top, right, bottom };
  }

  function rectsIntersect(a, b) {
    return !(a.right < b.left || a.left > b.right ||
             a.bottom < b.top || a.top > b.bottom);
  }

  function pointInRect(x, y, rect) {
    return x >= rect.left && x <= rect.right &&
           y >= rect.top  && y <= rect.bottom;
  }

  // Returns the 8 selection handles (4 corners + 4 edge midpoints)
  // for `bbox` in viewport coords, each tagged with the CSS cursor
  // it should show on hover.
  function selectionHandlePositions(bbox) {
    if (!bbox) return [];
    const cx = (bbox.left + bbox.right) / 2;
    const cy = (bbox.top + bbox.bottom) / 2;
    return [
      { name: "nw", x: bbox.left,  y: bbox.top,    cursor: "nwse-resize" },
      { name: "n",  x: cx,         y: bbox.top,    cursor: "ns-resize"   },
      { name: "ne", x: bbox.right, y: bbox.top,    cursor: "nesw-resize" },
      { name: "e",  x: bbox.right, y: cy,          cursor: "ew-resize"   },
      { name: "se", x: bbox.right, y: bbox.bottom, cursor: "nwse-resize" },
      { name: "s",  x: cx,         y: bbox.bottom, cursor: "ns-resize"   },
      { name: "sw", x: bbox.left,  y: bbox.bottom, cursor: "nesw-resize" },
      { name: "w",  x: bbox.left,  y: cy,          cursor: "ew-resize"   },
    ];
  }

  function hitTestSelectionHandle(clientX, clientY, bbox) {
    const handles = selectionHandlePositions(bbox);
    const r2 = SELECTION_HANDLE_HIT_PX * SELECTION_HANDLE_HIT_PX;
    for (const h of handles) {
      const dx = clientX - h.x, dy = clientY - h.y;
      if (dx*dx + dy*dy <= r2) return h;
    }
    return null;
  }

  // Snapshot the viewport position of every selected stroke's
  // points so move/resize can reproject from a stable origin
  // instead of accumulating per-frame deltas (which would slowly
  // drift due to fp arithmetic / anchor reflows).
  function snapshotSelected() {
    const snap = new Map();
    for (const s of selectedStrokes) {
      if (!s.points || s.points.length === 0) continue;
      const p0 = s.points[0];
      const pts = [];
      if (p0.fx === undefined) {
        for (const p of s.points) {
          pts.push({
            vx: p.x - window.scrollX,
            vy: p.y - window.scrollY,
            p: p.p,
          });
        }
        snap.set(s, { isLegacy: true, anchorId: null,
                      points: pts, width: s.width });
      } else {
        if (!s.anchor || !s.anchor.id) continue;
        const el = document.getElementById(s.anchor.id);
        if (!el) continue;
        const r = el.getBoundingClientRect();
        if (r.width <= 0 || r.height <= 0) continue;
        for (const p of s.points) {
          pts.push({
            vx: r.left + p.fx * r.width,
            vy: r.top  + p.fy * r.height,
            p: p.p,
          });
        }
        snap.set(s, { isLegacy: false, anchorId: s.anchor.id,
                      points: pts, width: s.width });
      }
    }
    return snap;
  }

  // Apply an affine transform (pivot + scale + translate) to every
  // snapshotted stroke and re-express the result in the stroke's
  // CURRENT anchor frame so the existing renderer just works.
  //   v' = pivot + (v - pivot) * scale + translate
  function applyTransformFromSnapshot(t) {
    if (!dragSnapshot) return;
    for (const [s, snap] of dragSnapshot) {
      let arect = null;
      if (!snap.isLegacy) {
        const el = document.getElementById(snap.anchorId);
        if (!el) continue;
        const r = el.getBoundingClientRect();
        if (r.width <= 0 || r.height <= 0) continue;
        arect = { left: r.left, top: r.top, w: r.width, h: r.height };
      }
      s.width = Math.max(0.5, snap.width * t.widthScale);
      s.points = snap.points.map((p) => {
        const vx2 = t.ox + (p.vx - t.ox) * t.sx + t.tx;
        const vy2 = t.oy + (p.vy - t.oy) * t.sy + t.ty;
        if (snap.isLegacy) {
          return { x: vx2 + window.scrollX, y: vy2 + window.scrollY, p: p.p };
        }
        return {
          fx: (vx2 - arect.left) / arect.w,
          fy: (vy2 - arect.top)  / arect.h,
          p: p.p,
        };
      });
    }
  }

  // After the user releases the pointer at the end of a move or
  // resize, re-anchor each transformed stroke to the deepest fine
  // anchor at its first point's new viewport position, so future
  // toggles / scrolls move it together with the surrounding text.
  function reanchorSelectedAfterTransform() {
    const rectCache = buildAnchorRectCache();
    for (const s of Array.from(selectedStrokes)) {
      const moved = reanchorStrokeAfterMove(s, rectCache);
      if (moved === s) continue;
      const idx = strokes.indexOf(s);
      if (idx >= 0) strokes[idx] = moved;
      selectedStrokes.delete(s);
      selectedStrokes.add(moved);
    }
  }

  // Re-anchor a stroke that the user has just MOVED or RESIZED with
  // the select tool. Differs from reanchorStrokeToFinestContainer
  // (which is for load-time migration) in three ways:
  //
  //   1. Picks the new anchor by the stroke's BBOX CENTER, not its
  //      first point. A pen stroke that spans two paragraphs would
  //      otherwise hand over the whole stroke to the upper paragraph
  //      and then drift visually as soon as anything reflows the
  //      gap between them.
  //
  //   2. NO area-vs-old-area guard. The original anchor is now
  //      irrelevant — the user explicitly dropped the stroke
  //      somewhere else. Always replace when we find a valid new
  //      anchor at the new position, even if it has the same area
  //      as (or is slightly larger than) the original (paragraph-
  //      to-paragraph moves are exactly this case).
  //
  //   3. Bare minimum filtering: only refuses to re-anchor when no
  //      valid candidate exists at all (which means the stroke was
  //      dropped entirely outside the document content; rare).
  //
  // Skipping these fixes is what the user perceived as "moved
  // strokes hiding behind HTML": when re-anchor was refused, the
  // stroke kept its old anchor with fx/fy values way outside [0,1].
  // It rendered correctly *immediately*, but the very next layout
  // change (a callout toggle, a window resize, a font load) shifted
  // the original anchor and dragged the stroke off-screen with it.
  function reanchorStrokeAfterMove(s, rectCache) {
    if (!s || !s.anchor || !s.anchor.id) return s;
    if (!s.points || s.points.length === 0) return s;
    const p0 = s.points[0];
    if (p0.fx === undefined) return s; // legacy unanchored — leave it
    const oldEl = document.getElementById(s.anchor.id);
    if (!oldEl) return s;
    const oldRect = oldEl.getBoundingClientRect();
    if (oldRect.width <= 0 || oldRect.height <= 0) return s;

    const sx = window.scrollX, sy = window.scrollY;
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of s.points) {
      const dx = oldRect.left + sx + p.fx * oldRect.width;
      const dy = oldRect.top  + sy + p.fy * oldRect.height;
      if (dx < minX) minX = dx;
      if (dy < minY) minY = dy;
      if (dx > maxX) maxX = dx;
      if (dy > maxY) maxY = dy;
    }
    const cx = (minX + maxX) / 2;
    const cy = (minY + maxY) / 2;

    let pick = findSmallestContainingAnchor(rectCache, cx, cy);
    // If the smallest-containing anchor is a COARSE container (a
    // <section>, <article>, etc. — i.e. the chapter-level wrapper),
    // prefer the nearest fine paragraph anchor instead. Sections in
    // a Quarto handout are MANY thousands of pixels tall (we've seen
    // h≈2627 in the logs); pinning a stroke to one means any reflow
    // inside the section (callout toggle, MathJax late render,
    // image load) shifts the stroke by `fy × Δsection_height` —
    // tens to hundreds of pixels for a single callout open. That
    // drift is what the user perceives as "the arrow disappeared
    // behind the math formula" — the stroke is still on top of all
    // HTML (canvas mounted on <html> with INT32_MAX z-index), but
    // it has visibly drifted away from where they dropped it, and
    // they see a math glyph at the expected location instead.
    if (!pick || isCoarseAnchorEl(pick.el)) {
      const fine = findNearestFineAnchorVertically(rectCache, cx, cy);
      if (fine) pick = fine;
    }
    if (pick && isInSidebar(pick.el)) {
      const main = findNearestFineAnchorVertically(
        rectCache, cx, cy, { mainColumnOnly: true }
      );
      if (main) pick = main;
    }
    if (!pick) return s;
    if (pick.el === oldEl) return s;

    const out = {
      ...s,
      v: 4,
      anchor: {
        id: pick.el.id,
        savedWidth:  pick.width,
        savedHeight: pick.height,
      },
      points: s.points.map((p) => {
        const px = oldRect.left + sx + p.fx * oldRect.width;
        const py = oldRect.top  + sy + p.fy * oldRect.height;
        return {
          fx: (px - pick.left) / pick.width,
          fy: (py - pick.top)  / pick.height,
          p: p.p,
        };
      }),
    };
    return out;
  }

  function clearSelection() {
    selectedStrokes = new Set();
    marqueeRect = null;
    selectionMode = null;
    dragSnapshot = null;
    dragOriginClient = null;
    dragStartBBox = null;
    resizeHandle = null;
    if (canvas && tool === "select") canvas.style.cursor = "crosshair";
    redraw();
  }

  function deleteSelected() {
    if (selectedStrokes.size === 0) return;
    strokes = strokes.filter((s) => !selectedStrokes.has(s));
    clearSelection();
  }

  // ── Selection rendering ────────────────────────────────────────
  // Draws (a) per-stroke dashed outlines for each selected stroke,
  // (b) the union bounding box with corner/edge handles, and
  // (c) the live marquee rectangle while the user is drag-selecting.
  function drawSelectionOverlay(anchorCache) {
    if (!ctx) return;
    if (selectedStrokes && selectedStrokes.size > 0) {
      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      ctx.globalAlpha = 1;
      ctx.strokeStyle = "rgba(37, 99, 235, 0.55)";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([5, 3]);
      for (const s of selectedStrokes) {
        const b = strokeViewportBBox(s, anchorCache);
        if (!b) continue;
        ctx.strokeRect(b.left - 2, b.top - 2,
                       b.right - b.left + 4, b.bottom - b.top + 4);
      }
      ctx.restore();
    }
    const bbox = getSelectionViewportBBox();
    if (bbox) {
      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      ctx.globalAlpha = 1;
      ctx.strokeStyle = "#2563eb";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([8, 4]);
      ctx.strokeRect(bbox.left, bbox.top,
                     bbox.right - bbox.left, bbox.bottom - bbox.top);
      ctx.setLineDash([]);
      const handles = selectionHandlePositions(bbox);
      for (const h of handles) {
        ctx.fillStyle = "#ffffff";
        ctx.strokeStyle = "#2563eb";
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(h.x, h.y, SELECTION_HANDLE_RADIUS, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
      ctx.restore();
    }
    if (marqueeRect) {
      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      ctx.globalAlpha = 1;
      ctx.fillStyle = "rgba(37, 99, 235, 0.10)";
      ctx.strokeStyle = "rgba(37, 99, 235, 0.7)";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 3]);
      const x = Math.min(marqueeRect.x0, marqueeRect.x1);
      const y = Math.min(marqueeRect.y0, marqueeRect.y1);
      const w = Math.abs(marqueeRect.x1 - marqueeRect.x0);
      const h = Math.abs(marqueeRect.y1 - marqueeRect.y0);
      ctx.fillRect(x, y, w, h);
      ctx.strokeRect(x, y, w, h);
      ctx.restore();
    }
  }

  // ── Selection-tool pointer dispatch ────────────────────────────
  function handleSelectPointerDown(e) {
    e.preventDefault();
    try { canvas.setPointerCapture(e.pointerId); } catch (_) {}
    const bbox = getSelectionViewportBBox();
    if (bbox) {
      const h = hitTestSelectionHandle(e.clientX, e.clientY, bbox);
      if (h) {
        selectionMode = "resizing";
        resizeHandle = h.name;
        dragOriginClient = { x: e.clientX, y: e.clientY };
        dragStartBBox = {
          left: bbox.left, top: bbox.top,
          right: bbox.right, bottom: bbox.bottom,
          width: bbox.right - bbox.left,
          height: bbox.bottom - bbox.top,
        };
        dragSnapshot = snapshotSelected();
        canvas.style.cursor = h.cursor;
        return;
      }
      if (pointInRect(e.clientX, e.clientY, bbox)) {
        selectionMode = "moving";
        dragOriginClient = { x: e.clientX, y: e.clientY };
        dragStartBBox = {
          left: bbox.left, top: bbox.top,
          right: bbox.right, bottom: bbox.bottom,
          width: bbox.right - bbox.left,
          height: bbox.bottom - bbox.top,
        };
        dragSnapshot = snapshotSelected();
        canvas.style.cursor = "grabbing";
        return;
      }
    }
    // Otherwise: clear any existing selection and start a new
    // marquee. We commit the marquee on pointerup.
    selectedStrokes = new Set();
    selectionMode = "marquee";
    marqueeRect = { x0: e.clientX, y0: e.clientY,
                    x1: e.clientX, y1: e.clientY };
    redraw();
  }

  function handleSelectPointerMove(e) {
    if (!selectionMode) {
      // Hover state: update cursor to hint move / resize affordances.
      const bbox = getSelectionViewportBBox();
      if (bbox) {
        const h = hitTestSelectionHandle(e.clientX, e.clientY, bbox);
        if (h) { canvas.style.cursor = h.cursor; return; }
        if (pointInRect(e.clientX, e.clientY, bbox)) {
          canvas.style.cursor = "move"; return;
        }
      }
      canvas.style.cursor = "crosshair";
      return;
    }
    e.preventDefault();
    if (selectionMode === "marquee") {
      marqueeRect.x1 = e.clientX;
      marqueeRect.y1 = e.clientY;
      redraw();
    } else if (selectionMode === "moving") {
      const dx = e.clientX - dragOriginClient.x;
      const dy = e.clientY - dragOriginClient.y;
      applyTransformFromSnapshot({
        ox: 0, oy: 0, sx: 1, sy: 1, tx: dx, ty: dy, widthScale: 1,
      });
      redraw();
    } else if (selectionMode === "resizing") {
      applyTransformFromSnapshot(computeResizeTransform(e.clientX, e.clientY));
      redraw();
    }
  }

  function handleSelectPointerUp(e) {
    if (!selectionMode) return;
    e.preventDefault();
    try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
    if (selectionMode === "marquee") {
      finishMarquee();
    } else if (selectionMode === "moving" || selectionMode === "resizing") {
      reanchorSelectedAfterTransform();
    }
    selectionMode = null;
    marqueeRect = null;
    dragSnapshot = null;
    dragOriginClient = null;
    dragStartBBox = null;
    resizeHandle = null;
    canvas.style.cursor = "crosshair";
    redraw();
  }

  function finishMarquee() {
    if (!marqueeRect) return;
    const m = {
      left:   Math.min(marqueeRect.x0, marqueeRect.x1),
      right:  Math.max(marqueeRect.x0, marqueeRect.x1),
      top:    Math.min(marqueeRect.y0, marqueeRect.y1),
      bottom: Math.max(marqueeRect.y0, marqueeRect.y1),
    };
    // Treat tiny drags as a "click on empty space" → leave selection
    // empty. Otherwise pick up every stroke whose bbox overlaps the
    // marquee. Eraser strokes are intentionally NOT selectable: they
    // only exist to subtract from the visual rendering and have no
    // independent meaning to the user.
    if (m.right - m.left < 3 && m.bottom - m.top < 3) {
      selectedStrokes = new Set();
      return;
    }
    const cache = new Map();
    selectedStrokes = new Set();
    for (const s of strokes) {
      if (s.tool === "eraser") continue;
      const b = strokeViewportBBox(s, cache);
      if (!b) continue;
      if (rectsIntersect(b, m)) selectedStrokes.add(s);
    }
  }

  // Convert (clientX, clientY) of the dragged handle into an affine
  // transform around the OPPOSITE corner / edge of the bbox. Corner
  // handles do uniform scale (preserve aspect ratio); edge handles
  // scale only along their axis. Stroke widths scale by the
  // geometric mean of |sx| · |sy| so they feel proportional.
  function computeResizeTransform(clientX, clientY) {
    const b = dragStartBBox;
    let pivotX, pivotY, edgeX, edgeY;
    switch (resizeHandle) {
      case "nw": pivotX = b.right; pivotY = b.bottom; edgeX = b.left;  edgeY = b.top;    break;
      case "ne": pivotX = b.left;  pivotY = b.bottom; edgeX = b.right; edgeY = b.top;    break;
      case "se": pivotX = b.left;  pivotY = b.top;    edgeX = b.right; edgeY = b.bottom; break;
      case "sw": pivotX = b.right; pivotY = b.top;    edgeX = b.left;  edgeY = b.bottom; break;
      case "n":  pivotX = (b.left+b.right)/2; pivotY = b.bottom; edgeX = pivotX; edgeY = b.top;    break;
      case "s":  pivotX = (b.left+b.right)/2; pivotY = b.top;    edgeX = pivotX; edgeY = b.bottom; break;
      case "e":  pivotX = b.left;             pivotY = (b.top+b.bottom)/2; edgeX = b.right; edgeY = pivotY; break;
      case "w":  pivotX = b.right;            pivotY = (b.top+b.bottom)/2; edgeX = b.left;  edgeY = pivotY; break;
    }
    const isCorner = resizeHandle.length === 2;
    const useX = resizeHandle.includes("e") || resizeHandle.includes("w");
    const useY = resizeHandle.includes("n") || resizeHandle.includes("s");
    const dxOrig = edgeX - pivotX;
    const dyOrig = edgeY - pivotY;
    const dxNew  = clientX - pivotX;
    const dyNew  = clientY - pivotY;
    let sx = 1, sy = 1;
    if (useX && Math.abs(dxOrig) > 1) sx = dxNew / dxOrig;
    if (useY && Math.abs(dyOrig) > 1) sy = dyNew / dyOrig;
    if (isCorner) {
      // Uniform scale: take the magnitude average, preserve sign.
      const u = (Math.abs(sx) + Math.abs(sy)) / 2 || 1;
      sx = (sx === 0 ? 1 : Math.sign(sx)) * u;
      sy = (sy === 0 ? 1 : Math.sign(sy)) * u;
    }
    // Floor very tiny scales so the bbox can't collapse to zero.
    const MIN = 0.05;
    if (Math.abs(sx) < MIN) sx = (sx < 0 ? -MIN : MIN);
    if (Math.abs(sy) < MIN) sy = (sy < 0 ? -MIN : MIN);
    const widthScale = Math.sqrt(Math.abs(sx) * Math.abs(sy)) || 1;
    return { ox: pivotX, oy: pivotY, sx, sy, tx: 0, ty: 0, widthScale };
  }

  // v4 strokes carry anchor-relative fractional coordinates
  // (fx, fy) ∈ [0, 1]² of the anchor element's bounding box. At
  // render time we re-fetch the anchor's current rect and convert
  // back to viewport pixels. Browser zoom and reflow are absorbed
  // for free because both the anchor and the viewport coordinates
  // come from the SAME live layout snapshot.
  //
  // Stroke thickness scales with zoom too:
  //     lineWidth = savedWidth * (anchorNow.width / anchorSaved.width)
  // so notes thicken when zoomed in (matching how the underlying
  // text gets bigger), instead of staying a fixed CSS-px size.
  //
  // Legacy unanchored (v2) strokes hold raw doc-coord points and
  // render via a translation-only fallback (zoom-fragile, but
  // preserved for backward compatibility while loading old files).
  function drawStroke(s, anchorCache) {
    if (!s.points || s.points.length === 0) return;
    const sx = window.scrollX, sy = window.scrollY;

    let rect = null;
    let scale = 1.0;
    if (s.anchor && s.anchor.id) {
      if (anchorCache && anchorCache.has(s.anchor.id)) {
        rect = anchorCache.get(s.anchor.id);
      } else {
        const el = document.getElementById(s.anchor.id);
        if (el) {
          const r = el.getBoundingClientRect();
          if (r.width > 0 && r.height > 0) {
            rect = { left: r.left, top: r.top, width: r.width, height: r.height };
          }
        }
        if (anchorCache) anchorCache.set(s.anchor.id, rect);
      }
      if (rect && s.anchor.savedWidth > 0) {
        scale = rect.width / s.anchor.savedWidth;
        // Clamp sub-pixel noise to identity to keep the stroke
        // visually stable when the layout hasn't actually changed.
        if (Math.abs(scale - 1) < 0.005) scale = 1;
      }
    }

    ctx.save();
    if (s.tool === "eraser") {
      ctx.globalCompositeOperation = "destination-out";
      ctx.strokeStyle = "rgba(0,0,0,1)";
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
    } else if (s.tool === "highlighter") {
      ctx.globalCompositeOperation = "source-over";
      ctx.globalAlpha = HIGHLIGHTER_ALPHA;
      ctx.strokeStyle = s.color;
      // Flat caps so overlapping segments don't pile up at joints.
      ctx.lineCap = "butt";
      ctx.lineJoin = "round";
    } else {
      ctx.globalCompositeOperation = "source-over";
      ctx.strokeStyle = s.color;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
    }
    ctx.lineWidth = (s.width || 4) * scale;
    ctx.beginPath();
    const [p0, ...rest] = s.points;
    const isFractional = (p0.fx !== undefined);
    if (rect && isFractional) {
      // v4 path: fractional → viewport via current anchor rect.
      ctx.moveTo(rect.left + p0.fx * rect.width, rect.top + p0.fy * rect.height);
      for (const p of rest) {
        ctx.lineTo(rect.left + p.fx * rect.width, rect.top + p.fy * rect.height);
      }
    } else if (isFractional) {
      // v4 stroke whose anchor element no longer exists on the
      // page — skip silently.
      ctx.restore();
      return;
    } else {
      // Legacy v2 unanchored — render at saved doc coords.
      ctx.moveTo(p0.x - sx, p0.y - sy);
      for (const p of rest) ctx.lineTo(p.x - sx, p.y - sy);
    }
    ctx.stroke();
    ctx.restore();
  }

  // Touch (finger) is intentionally ignored so the user can still
  // scroll the page with a finger swipe while annotation is ON.
  // Pen and mouse always draw.
  function isDrawingPointer(e) {
    return e.pointerType !== "touch";
  }

  function onPointerDown(e) {
    if (!enabled) return;
    if (!isDrawingPointer(e)) return;
    if (e.button !== undefined && e.button !== 0) return;
    if (tool === "select") { handleSelectPointerDown(e); return; }
    e.preventDefault();
    canvas.setPointerCapture(e.pointerId);
    drawing = true;
    const w = (e.pointerType === "pen" && e.pressure > 0)
      ? Math.max(1, width * (e.pressure * 1.5 + 0.4))
      : width;

    // v4: pin the stroke to the smallest [id]-bearing element under
    // the pointer (preferred), or fall back to the nearest [id]
    // above when the click landed on margins / unnamed wrappers.
    //
    // Two layered overrides on top of the generic lookup:
    //
    //   (a) ERASER inherits the OVERLAPPING pen/highlighter stroke's
    //       anchor whenever possible. Without this, an eraser drawn
    //       across a stroke can land on a different anchor element
    //       (very common when erasing a stroke that crosses into
    //       the right margin sidebar) and then drift away from its
    //       target on the next reflow — the visible "erase, then
    //       comes back on scroll" symptom.
    //
    //   (b) Anchors that fall INSIDE the right-margin sidebar
    //       (#quarto-margin-sidebar / #TOC) are redirected to the
    //       closest fine anchor in the main body column at the
    //       same vertical position. This makes the sidebar usable
    //       as a normal note area: the stroke renders visually in
    //       the sidebar (fx > 1 is allowed) but moves with the
    //       body content it relates to instead of staying pinned
    //       to a sticky sidebar.
    let anchorEl = null;
    if (tool === "eraser") {
      // Eraser hit-test radius = the eraser's own stroke width.
      // (With a Surface pen, `width` here is the user-selected
      // width, not the pressure-modulated `w` variable.)
      const overlap = findOverlappingStrokeAt(
        e.clientX, e.clientY, Math.max(8, width)
      );
      if (overlap && overlap.anchor && overlap.anchor.id) {
        anchorEl = document.getElementById(overlap.anchor.id);
      }
    }
    if (!anchorEl) {
      anchorEl = findContainingAnchor(e.clientX, e.clientY)
              || findFallbackAnchorElement(e.clientX, e.clientY);
      if (anchorEl && isInSidebar(anchorEl)) {
        const main = findMainColumnAnchorAtY(e.clientY);
        if (main) anchorEl = main;
      }
    }
    if (anchorEl) {
      const r = anchorEl.getBoundingClientRect();
      currentStroke = {
        v: 4,
        tool, color, width: w,
        anchor: {
          id: anchorEl.id,
          savedWidth:  r.width,
          savedHeight: r.height,
        },
        points: [{
          fx: (e.clientX - r.left) / r.width,
          fy: (e.clientY - r.top)  / r.height,
          p: e.pressure || 0.5,
        }],
      };
    } else {
      // No usable anchor on the entire page — extremely unusual.
      // Fall back to legacy v2 doc-coord storage; the stroke will
      // render via the no-anchor fallback in drawStroke.
      currentStroke = {
        tool, color, width: w,
        anchor: null,
        points: [{
          x: e.clientX + window.scrollX,
          y: e.clientY + window.scrollY,
          p: e.pressure || 0.5,
        }],
      };
    }
    strokes.push(currentStroke);
  }
  function onPointerMove(e) {
    if (!enabled) return;
    if (!isDrawingPointer(e)) return;
    if (tool === "select") { handleSelectPointerMove(e); return; }
    if (!drawing) return;
    e.preventDefault();
    const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];

    // Number of new points this callback adds. We need this to draw
    // a CONNECTED path covering ALL of them — not just the last
    // segment — otherwise fast strokes (where the browser coalesces
    // multiple pointermoves) end up with visible gaps and look like
    // a dashed line. (The redraw() path used by zoom/resize hides
    // the bug because it walks every point in one beginPath, which
    // is exactly what we now do here too.)
    const newCount = events.length;
    if (newCount === 0) return;

    if (currentStroke.v === 4) {
      // Re-fetch the anchor's current rect on every move so the
      // stroke "rides" the anchor even if the user scrolls / zooms
      // mid-stroke (rare, but free to support).
      const anchorEl = document.getElementById(currentStroke.anchor.id);
      if (!anchorEl) return;
      const r = anchorEl.getBoundingClientRect();
      if (r.width <= 0 || r.height <= 0) return;
      for (const ev of events) {
        currentStroke.points.push({
          fx: (ev.clientX - r.left) / r.width,
          fy: (ev.clientY - r.top)  / r.height,
          p: ev.pressure || 0.5,
        });
      }
      const pts = currentStroke.points;
      if (pts.length < 2) return;

      if (currentStroke.tool === "highlighter") {
        redraw();
        return;
      }
      ctx.save();
      if (currentStroke.tool === "eraser") {
        ctx.globalCompositeOperation = "destination-out";
        ctx.strokeStyle = "rgba(0,0,0,1)";
      } else {
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = currentStroke.color;
      }
      // Mid-stroke: anchor's current rect equals the saved rect, so
      // scale = 1 and lineWidth equals the captured width.
      ctx.lineWidth = currentStroke.width;
      ctx.beginPath();
      // startIdx = the LAST point already drawn before this callback
      // (i.e. the point right before the first new one). Drawing
      // moveTo(startIdx) → lineTo(...all new points...) makes the
      // new sub-path connect cleanly to the strokes already painted.
      const startIdx = Math.max(0, pts.length - newCount - 1);
      const start = pts[startIdx];
      ctx.moveTo(r.left + start.fx * r.width, r.top + start.fy * r.height);
      for (let i = startIdx + 1; i < pts.length; i++) {
        const p = pts[i];
        ctx.lineTo(r.left + p.fx * r.width, r.top + p.fy * r.height);
      }
      ctx.stroke();
      ctx.restore();
    } else {
      // Legacy unanchored fallback — doc-coord live drawing.
      const sx = window.scrollX, sy = window.scrollY;
      for (const ev of events) {
        currentStroke.points.push({
          x: ev.clientX + sx, y: ev.clientY + sy, p: ev.pressure || 0.5,
        });
      }
      const pts = currentStroke.points;
      if (pts.length < 2) return;
      if (currentStroke.tool === "highlighter") { redraw(); return; }
      ctx.save();
      if (currentStroke.tool === "eraser") {
        ctx.globalCompositeOperation = "destination-out";
        ctx.strokeStyle = "rgba(0,0,0,1)";
      } else {
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = currentStroke.color;
      }
      ctx.lineWidth = currentStroke.width;
      ctx.beginPath();
      const startIdx = Math.max(0, pts.length - newCount - 1);
      ctx.moveTo(pts[startIdx].x - sx, pts[startIdx].y - sy);
      for (let i = startIdx + 1; i < pts.length; i++) {
        ctx.lineTo(pts[i].x - sx, pts[i].y - sy);
      }
      ctx.stroke();
      ctx.restore();
    }
  }
  function onPointerUp(e) {
    if (!enabled) return;
    if (!isDrawingPointer(e)) return;
    if (tool === "select") { handleSelectPointerUp(e); return; }
    if (!drawing) return;
    e.preventDefault();
    drawing = false;
    currentStroke = null;
    try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
  }

  const TOOLBAR_BTN_STYLE = {
    border: "1px solid #d1d5db",
    background: "#ffffff",
    color: "#111827",
    padding: "4px 10px",
    borderRadius: "6px",
    cursor: "pointer",
    font: "13px/1.2 system-ui, -apple-system, sans-serif",
    minWidth: "32px",
    // Wrapper sets pointer-events: none so strokes underneath stay
    // visible (and clickable for select/erase) in the gaps between
    // buttons; each button has to explicitly re-enable hit-testing.
    pointerEvents: "auto",
  };

  function makeBtn(label, onClick, opts = {}) {
    return el("button", {
      type: "button",
      title: opts.title || label,
      style: { ...TOOLBAR_BTN_STYLE, ...(opts.style || {}) },
      onclick: onClick,
    }, label);
  }

  function makeToolbar() {
    // ── Idle / hover background opacity ───────────────────────────
    // The toolbar is mounted on top of the annotation canvas with the
    // same z-index, so anything painted under it (strokes drawn on the
    // canvas) is obscured by the toolbar's background / border / box-
    // shadow box. The display-math-audit log confirmed this: the math
    // at viewport y≈7–29 (top of viewport) consistently had
    // `DIV#annotation-toolbar` as the topmost element at its center,
    // and the toolbar's flex-wrap layout makes it ~800px wide on a
    // 1512px viewport — wide enough to cover the document column.
    //
    // Going through 55% white background still washed out strokes
    // (red pen on a 55% white film looks pale enough that the user
    // perceives it as "hidden behind the equation"). Switch the
    // entire wrapper to fully transparent at idle so every stroke
    // shows through cleanly. The individual buttons retain their own
    // backgrounds so they stay legible. On hover we restore the
    // background + border + shadow so the user can read and aim at
    // the buttons reliably.
    const bar = el("div", {
      id: "annotation-toolbar",
      style: {
        position: "fixed",
        top: "12px",
        right: "12px",
        zIndex: "2147483647",
        display: "flex",
        flexWrap: "wrap",
        gap: "6px",
        padding: "8px 10px",
        background: "transparent",
        border: "1px solid transparent",
        borderRadius: "10px",
        boxShadow: "none",
        font: "13px/1.2 system-ui, -apple-system, sans-serif",
        alignItems: "center",
        userSelect: "none",
        // Disable hit-testing on the wrapper itself so the canvas
        // catches pointer events in the gaps between buttons. Each
        // button (and the drag handle) explicitly re-enables
        // pointer-events:auto so they remain clickable.
        pointerEvents: "none",
        transition: "background-color 120ms ease, border-color 120ms ease, box-shadow 120ms ease",
      },
    });
    const TOOLBAR_BG_HOVER = "rgba(255,255,255,0.97)";
    // Hover handlers fire from BUTTON children (because wrapper has
    // pointerEvents: none); the bubbled `pointerover` / `pointerout`
    // on the wrapper still let us swap to opaque so the user can
    // read the buttons reliably. We don't reset on pointerout from
    // a child to a sibling button (relatedTarget is inside the bar);
    // only on actual exit.
    bar.addEventListener("pointerover", () => {
      bar.style.background = TOOLBAR_BG_HOVER;
      bar.style.borderColor = "#d1d5db";
      bar.style.boxShadow = "0 4px 14px rgba(0,0,0,0.10)";
    });
    bar.addEventListener("pointerout", (e) => {
      if (e.relatedTarget && bar.contains(e.relatedTarget)) return;
      bar.style.background = "transparent";
      bar.style.borderColor = "transparent";
      bar.style.boxShadow = "none";
    });

    // ── Drag handle ────────────────────────────────────────────
    // A small "⋮⋮" grip the user can grab to move the whole toolbar
    // anywhere on the viewport. We use Pointer Events so mouse, pen and
    // touch all work; the resulting position is persisted to
    // localStorage so it survives page reloads.
    const dragHandle = el("div", {
      id: "annotation-drag-handle",
      title: "Drag to move toolbar",
      style: {
        cursor: "grab",
        padding: "2px 6px",
        color: "#6b7280",
        font: "16px/1 system-ui, -apple-system, sans-serif",
        userSelect: "none",
        touchAction: "none",
        pointerEvents: "auto",
      },
    }, "⋮⋮");

    dragHandle.addEventListener("pointerdown", (e) => {
      if (e.button !== undefined && e.button !== 0) return;
      const rect = bar.getBoundingClientRect();
      // Convert any right/bottom-anchored placement to absolute
      // top/left so we can move it freely from here on.
      bar.style.right = "auto";
      bar.style.bottom = "auto";
      bar.style.left = rect.left + "px";
      bar.style.top = rect.top + "px";
      toolbarDragging = true;
      toolbarDragStartClient = { x: e.clientX, y: e.clientY };
      toolbarDragStartLeft = rect.left;
      toolbarDragStartTop = rect.top;
      dragHandle.style.cursor = "grabbing";
      try { dragHandle.setPointerCapture(e.pointerId); } catch (_) {}
      e.preventDefault();
    });
    dragHandle.addEventListener("pointermove", (e) => {
      if (!toolbarDragging) return;
      const dx = e.clientX - toolbarDragStartClient.x;
      const dy = e.clientY - toolbarDragStartClient.y;
      bar.style.left = (toolbarDragStartLeft + dx) + "px";
      bar.style.top  = (toolbarDragStartTop  + dy) + "px";
      clampToolbarPosition();
      e.preventDefault();
    });
    const endToolbarDrag = (e) => {
      if (!toolbarDragging) return;
      toolbarDragging = false;
      dragHandle.style.cursor = "grab";
      saveToolbarPosition();
      try { dragHandle.releasePointerCapture(e.pointerId); } catch (_) {}
    };
    dragHandle.addEventListener("pointerup", endToolbarDrag);
    dragHandle.addEventListener("pointercancel", endToolbarDrag);

    const onOff = makeBtn("✏ Annotate: OFF", () => setEnabled(!enabled), {
      style: { background: "#f3f4f6", fontWeight: "600" },
    });
    onOff.id = "annotation-toggle";

    const cursorBtn = makeBtn("↖ Cursor", () => setTool("cursor"), {
      title: "Cursor — interact with the page (scroll, click, TOC). " +
             "Drawings remain visible. (C)",
    });
    const penBtn = makeBtn("Pen", () => setTool("pen"));
    const hlBtn = makeBtn("Highlighter", () => setTool("highlighter"));
    const selectBtn = makeBtn("⬚ Select", () => setTool("select"), {
      title: "Select — drag a marquee to pick strokes, then drag " +
             "the box to MOVE or drag a corner / edge to RESIZE. " +
             "Delete / Backspace removes the selection. Esc clears it. (S)",
    });
    const eraserBtn = makeBtn("Eraser", () => setTool("eraser"));
    cursorBtn.id = "annotation-cursor";
    penBtn.id = "annotation-pen";
    hlBtn.id = "annotation-highlighter";
    selectBtn.id = "annotation-select";
    eraserBtn.id = "annotation-eraser";

    const colorWrap = el("div", {
      // The selected swatch is highlighted with a thicker blue
      // outline + offset (see updateColorPalette). Adding small
      // horizontal padding keeps the highlight from being clipped
      // when the leftmost / rightmost swatch is the selected one.
      style: { display: "flex", gap: "8px", padding: "0 4px", pointerEvents: "auto" },
    });
    COLORS.forEach(c => {
      const sw = el("button", {
        type: "button",
        title: c.name,
        "data-color": c.value,
        // Stable hook used by updateColorPalette() to apply the
        // "selected" indicator across all swatches whenever the
        // current color changes.
        "data-annotation-color": c.value,
        style: {
          width: "22px", height: "22px",
          background: c.value,
          border: "2px solid #ffffff",
          outline: "1px solid #9ca3af",
          outlineOffset: "0",
          borderRadius: "50%",
          cursor: "pointer",
          padding: "0",
          pointerEvents: "auto",
        },
        onclick: () => setColor(c.value),
      });
      colorWrap.appendChild(sw);
    });

    const widthSel = el("select", {
      title: "stroke width",
      style: { ...TOOLBAR_BTN_STYLE, padding: "4px 6px" },
      onchange: (e) => setWidth(Number(e.target.value)),
    });
    WIDTHS.forEach(w => {
      const opt = el("option", { value: String(w.value) }, w.name + " (" + w.value + "px)");
      if (w.value === width) opt.setAttribute("selected", "selected");
      widthSel.appendChild(opt);
    });
    widthSel.id = "annotation-width";

    const undoBtn = makeBtn("Undo", undo);
    const clearBtn = makeBtn("Clear", () => {
      if (strokes.length && confirm("Clear all annotations?")) {
        strokes = [];
        redraw();
      }
    });

    const saveBtn = makeBtn("Save .json", saveJson);
    const loadBtn = makeBtn("Load .json", () => pickAndLoad());
    // Hidden legacy <input type=file> as fallback for browsers / contexts
    // (Safari, Firefox, file://) where showOpenFilePicker is unavailable.
    const fileInput = el("input", {
      type: "file",
      accept: "application/json,.json",
      style: { display: "none" },
      onchange: (e) => {
        const f = e.target.files && e.target.files[0];
        if (f) loadJson(f);
        e.target.value = "";
      },
    });

    const sep = () => el("span", {
      style: {
        display: "inline-block",
        width: "1px", height: "22px",
        background: "#e5e7eb", margin: "0 2px",
      },
    });

    // ── Hide button ────────────────────────────────────────────
    // Collapses the toolbar entirely; a small "✏" launcher (built in
    // makeShowButton) appears at top-right so the user can bring it
    // back. Visibility state is persisted to localStorage.
    const hideBtn = makeBtn("✕", () => setToolbarVisible(false), {
      title: "Hide toolbar (Alt+T)",
      style: { padding: "4px 8px", fontWeight: "600", color: "#6b7280" },
    });
    hideBtn.id = "annotation-hide";

    bar.appendChild(dragHandle);
    bar.appendChild(onOff);
    bar.appendChild(sep());
    bar.appendChild(cursorBtn);
    bar.appendChild(penBtn);
    bar.appendChild(hlBtn);
    bar.appendChild(selectBtn);
    bar.appendChild(eraserBtn);
    bar.appendChild(sep());
    bar.appendChild(colorWrap);
    bar.appendChild(widthSel);
    bar.appendChild(sep());
    bar.appendChild(undoBtn);
    bar.appendChild(clearBtn);
    bar.appendChild(sep());
    bar.appendChild(saveBtn);
    bar.appendChild(loadBtn);
    bar.appendChild(fileInput);
    bar.appendChild(sep());
    bar.appendChild(hideBtn);

    getOverlayHost().appendChild(bar);
    return bar;
  }

  // ── Toolbar position / visibility helpers ──────────────────────
  function clampToolbarPosition() {
    if (!toolbar) return;
    // Only clamp when the user has actually positioned the toolbar
    // via left/top (i.e. dragged or restored). The default
    // top/right anchor handles itself.
    if (!toolbar.style.left || !toolbar.style.top) return;
    const margin = 4;
    const w = toolbar.offsetWidth;
    const h = toolbar.offsetHeight;
    let left = parseFloat(toolbar.style.left);
    let top = parseFloat(toolbar.style.top);
    if (isNaN(left) || isNaN(top)) return;
    left = Math.max(margin, Math.min(window.innerWidth  - w - margin, left));
    top  = Math.max(margin, Math.min(window.innerHeight - h - margin, top));
    toolbar.style.right = "auto";
    toolbar.style.bottom = "auto";
    toolbar.style.left = left + "px";
    toolbar.style.top = top + "px";
  }

  function saveToolbarPosition() {
    if (!toolbar) return;
    try {
      const left = parseFloat(toolbar.style.left);
      const top = parseFloat(toolbar.style.top);
      if (!isNaN(left) && !isNaN(top)) {
        localStorage.setItem(STORAGE_POS_KEY, JSON.stringify({ left, top }));
      }
    } catch (_) {}
  }

  function restoreToolbarPosition() {
    if (!toolbar) return;
    try {
      const raw = localStorage.getItem(STORAGE_POS_KEY);
      if (!raw) return;
      const pos = JSON.parse(raw);
      if (pos && typeof pos.left === "number" && typeof pos.top === "number") {
        toolbar.style.right = "auto";
        toolbar.style.bottom = "auto";
        toolbar.style.left = pos.left + "px";
        toolbar.style.top = pos.top + "px";
        clampToolbarPosition();
      }
    } catch (_) {}
  }

  function setToolbarVisible(on) {
    if (!toolbar) return;
    toolbar.style.display = on ? "flex" : "none";
    if (showBtn) showBtn.style.display = on ? "none" : "flex";
    try { localStorage.setItem(STORAGE_VIS_KEY, on ? "1" : "0"); } catch (_) {}
  }

  function restoreToolbarVisibility() {
    let visible = true;
    try {
      const raw = localStorage.getItem(STORAGE_VIS_KEY);
      if (raw === "0") visible = false;
    } catch (_) {}
    setToolbarVisible(visible);
  }

  // Tiny round "✏" button visible only while the toolbar is hidden,
  // so the user can always bring the toolbar back without remembering
  // the keyboard shortcut.
  function makeShowButton() {
    // Same idle/hover transparency story as the toolbar (see the
    // long comment in makeToolbar for the rationale): a 36×36 button
    // pinned at the top of the viewport will hide any stroke that
    // happens to be under it. Keep it mostly see-through at rest.
    const SHOWBTN_BG_IDLE  = "rgba(255,255,255,0.55)";
    const SHOWBTN_BG_HOVER = "rgba(255,255,255,0.97)";
    const btn = el("button", {
      type: "button",
      title: "Show annotation toolbar (Alt+T)",
      style: {
        position: "fixed",
        top: "12px",
        right: "12px",
        zIndex: "2147483647",
        width: "36px",
        height: "36px",
        borderRadius: "50%",
        border: "1px solid #d1d5db",
        background: SHOWBTN_BG_IDLE,
        color: "#111827",
        boxShadow: "0 4px 14px rgba(0,0,0,0.10)",
        cursor: "pointer",
        font: "16px/1 system-ui, -apple-system, sans-serif",
        display: "none",
        alignItems: "center",
        justifyContent: "center",
        padding: "0",
        transition: "background-color 120ms ease",
      },
      onclick: () => setToolbarVisible(true),
    }, "✏");
    btn.addEventListener("pointerenter", () => {
      btn.style.background = SHOWBTN_BG_HOVER;
    });
    btn.addEventListener("pointerleave", () => {
      btn.style.background = SHOWBTN_BG_IDLE;
    });
    return btn;
  }

  // Sync the canvas's pointer-events / display with the current
  // (enabled, tool) pair:
  //   • annotation OFF             → canvas hidden, no events
  //   • annotation ON  + cursor    → canvas visible, events pass
  //                                   through to the page
  //   • annotation ON  + drawing   → canvas visible, events captured
  function updateCanvasInteractivity() {
    if (!canvas) return;
    if (!enabled) {
      canvas.style.pointerEvents = "none";
      canvas.style.display = "none";
      return;
    }
    canvas.style.display = "block";
    canvas.style.pointerEvents = (tool === "cursor") ? "none" : "auto";
  }

  function setEnabled(on) {
    enabled = on;
    updateCanvasInteractivity();
    const btn = document.getElementById("annotation-toggle");
    if (btn) {
      btn.textContent = on ? "✏ Annotate: ON" : "✏ Annotate: OFF";
      btn.style.background = on ? "#fef3c7" : "#f3f4f6";
    }
    // Page scrolling stays enabled even while annotating — wheel /
    // trackpad / keyboard / touch (finger) all work, and the strokes
    // follow the page content because they are stored in document
    // coordinates.
  }
  function setTool(t) {
    if (!TOOLS.includes(t)) return;
    // Cancel any in-progress stroke when switching to the
    // non-drawing cursor / select tools.
    if ((t === "cursor" || t === "select") && drawing) {
      drawing = false;
      currentStroke = null;
    }
    // Switching AWAY from select drops any active selection so the
    // overlay UI doesn't linger over other tools.
    if (tool === "select" && t !== "select") {
      clearSelection();
    }
    tool = t;

    // Restore the per-tool color (eraser/cursor keep the previous
    // pen color internally; they just don't use it).
    if (TOOL_COLOR[tool]) color = TOOL_COLOR[tool];

    // Restore the tool's preferred default stroke width and sync the
    // dropdown so the user can see it. Cursor has no preferred width
    // → leave the previous value untouched.
    if (DEFAULT_WIDTH[tool]) width = DEFAULT_WIDTH[tool];
    const sel = document.getElementById("annotation-width");
    if (sel) sel.value = String(width);

    const c   = document.getElementById("annotation-cursor");
    const p   = document.getElementById("annotation-pen");
    const h   = document.getElementById("annotation-highlighter");
    const se  = document.getElementById("annotation-select");
    const e2  = document.getElementById("annotation-eraser");
    if (c)  c.style.outline  = tool === "cursor"      ? "2px solid #2563eb" : "none";
    if (p)  p.style.outline  = tool === "pen"         ? "2px solid #2563eb" : "none";
    if (h)  h.style.outline  = tool === "highlighter" ? "2px solid #2563eb" : "none";
    if (se) se.style.outline = tool === "select"      ? "2px solid #2563eb" : "none";
    if (e2) e2.style.outline = tool === "eraser"      ? "2px solid #2563eb" : "none";

    updateCursor();
    updateCanvasInteractivity();
    // Tool switch also restored a per-tool color above; reflect it
    // in the palette indicator.
    updateColorPalette();
  }
  function setColor(c) {
    color = c;
    // Remember per-tool so switching back restores it.
    if (tool === "pen" || tool === "highlighter") TOOL_COLOR[tool] = c;
    updateCursor();
    updateColorPalette();
  }

  // Visually mark the currently active color in the palette by
  // giving it a thick blue ring (matching the highlight used on the
  // active tool button). All other swatches revert to the default
  // 1px gray outline.
  function updateColorPalette() {
    const swatches = document.querySelectorAll(
      "#annotation-toolbar [data-annotation-color]"
    );
    swatches.forEach(sw => {
      const isSelected = sw.getAttribute("data-annotation-color") === color;
      if (isSelected) {
        sw.style.outline = "3px solid #2563eb";
        sw.style.outlineOffset = "2px";
      } else {
        sw.style.outline = "1px solid #9ca3af";
        sw.style.outlineOffset = "0";
      }
    });
  }
  function setWidth(w) {
    width = w;
    // Remember per-tool so switching back restores it.
    DEFAULT_WIDTH[tool] = w;
    updateCursor();
  }

  // Build a custom cursor that reflects the active tool & stroke width:
  //   pen         → solid circle (outlined)
  //   highlighter → rectangle (flat marker tip)
  //   eraser      → dashed circle
  // Each shape is a tiny SVG inlined as a data URL, with a white halo so
  // it stays visible on both light and dark backgrounds.
  function updateCursor() {
    if (!canvas) return;
    // Cursor tool: the canvas does not capture pointer events, so its
    // own cursor is moot. Reset to default for tidiness.
    if (tool === "cursor") {
      canvas.style.cursor = "default";
      return;
    }
    // Select tool: a plain crosshair while the user hovers empty
    // space; handleSelectPointerMove swaps in `move` / `*-resize`
    // when the pointer is over the selection bbox or its handles.
    if (tool === "select") {
      canvas.style.cursor = "crosshair";
      return;
    }
    const MIN_VIS = 10;
    const MAX_VIS = 96;            // browser cursor size sanity cap
    const visW = Math.min(MAX_VIS, Math.max(MIN_VIS, width));
    let svg, size, hotX, hotY;

    if (tool === "pen") {
      const r = visW / 2;
      size = visW + 4;
      const c = size / 2;
      svg = "<svg xmlns='http://www.w3.org/2000/svg' width='" + size + "' height='" + size + "' viewBox='0 0 " + size + " " + size + "'>"
          + "<circle cx='" + c + "' cy='" + c + "' r='" + r + "' fill='none' stroke='white' stroke-width='3'/>"
          + "<circle cx='" + c + "' cy='" + c + "' r='" + r + "' fill='none' stroke='" + color + "' stroke-width='1.5'/>"
          + "<circle cx='" + c + "' cy='" + c + "' r='1.2' fill='" + color + "'/>"
          + "</svg>";
      hotX = hotY = c;
    } else if (tool === "highlighter") {
      const rectW = visW;
      const rectH = Math.max(6, Math.round(visW / 2));
      size = Math.max(rectW, rectH) + 4;
      const cx = size / 2, cy = size / 2;
      const x = cx - rectW / 2, y = cy - rectH / 2;
      svg = "<svg xmlns='http://www.w3.org/2000/svg' width='" + size + "' height='" + size + "' viewBox='0 0 " + size + " " + size + "'>"
          + "<rect x='" + (x - 1) + "' y='" + (y - 1) + "' width='" + (rectW + 2) + "' height='" + (rectH + 2) + "' fill='none' stroke='white' stroke-width='3'/>"
          + "<rect x='" + x + "' y='" + y + "' width='" + rectW + "' height='" + rectH + "' fill='" + color + "' fill-opacity='0.30' stroke='" + color + "' stroke-width='1.5'/>"
          + "</svg>";
      hotX = hotY = cx;
    } else {
      // eraser → dashed circle (white halo + dark gray dashes)
      const r = visW / 2;
      size = visW + 4;
      const c = size / 2;
      svg = "<svg xmlns='http://www.w3.org/2000/svg' width='" + size + "' height='" + size + "' viewBox='0 0 " + size + " " + size + "'>"
          + "<circle cx='" + c + "' cy='" + c + "' r='" + r + "' fill='none' stroke='white' stroke-width='3' stroke-dasharray='5 4'/>"
          + "<circle cx='" + c + "' cy='" + c + "' r='" + r + "' fill='none' stroke='#1f2937' stroke-width='1.5' stroke-dasharray='5 4'/>"
          + "</svg>";
      hotX = hotY = c;
    }

    const enc = encodeURIComponent(svg);
    canvas.style.cursor = 'url("data:image/svg+xml;utf8,' + enc + '") '
                        + hotX + ' ' + hotY + ', crosshair';
  }

  function undo() {
    if (strokes.length === 0) return;
    strokes.pop();
    redraw();
  }

  // ── Content anchors ────────────────────────────────────────────
  // Each stroke is pinned to the nearest [id]-bearing content
  // element above its starting point. On load we re-find that
  // element by id and translate the whole stroke by the difference
  // between the saved anchor position and the anchor's current
  // position — which absorbs cross-machine font drift far more
  // accurately than a linear document-height rescale.
  const ANCHOR_IGNORE_PREFIXES = ["annotation-"];
  const ANCHOR_IGNORE_IDS = new Set([
    "TOC",
    "title-block-header",
    "quarto-document-content",
  ]);
  let anchorListCache = null;

  // ── Fine-grained synthetic anchors ─────────────────────────────
  // Quarto attaches `id` to <section>, headings, code cells and
  // figures, but NOT to <p>, <li>, <summary>, <blockquote>, etc.
  // That means the smallest [id]-bearing ancestor of most click
  // targets is the *whole section* — often several thousand pixels
  // tall. Fractional coordinates inside such an anchor preserve
  // position only for uniform scale changes (browser zoom). They
  // do NOT preserve position when content INSIDE the section
  // reflows (e.g. a Quarto callout `<details>` is toggled open):
  // the section grows by Δh, and a stroke at fy = 0.7 moves only
  // 0.7·Δh while the underlying text moves by Δh → visible drift.
  //
  // Fix: walk the DOM once at init() and assign deterministic
  // synthetic ids to leaf-ish layout blocks that don't reflow
  // internally. With those in place, findContainingAnchor() picks
  // the paragraph / list-item / summary instead of the section,
  // and the stroke's fractional coords land inside an element that
  // simply translates as a rigid body when other siblings expand.
  //
  // Determinism: ids are assigned in document order (ann-fine-1,
  // ann-fine-2, ...). For a stable .qmd source they are stable
  // across re-renders, so saved annotations referencing them keep
  // working. Strokes saved BEFORE fine anchors existed (e.g.
  // anchored to a section id) are migrated by
  // realignStrokesToCurrentDocument() at load time — see
  // reanchorStrokeToFinestContainer.
  //
  // Why we DO NOT include <details> / .callout themselves: those
  // are exactly the elements that grow when toggled, so anchoring
  // to them recreates the original problem at a smaller scale.
  // Anchor to their *children* (summary + inner <p>, <li>, ...)
  // instead, which translate but don't stretch.
  const FINE_ANCHOR_SELECTOR = [
    "p", "li", "dt", "dd",
    "blockquote", "pre",
    "figure", "table",
    "summary",
    "h1", "h2", "h3", "h4", "h5", "h6",
    "hr",
  ].join(",");
  const FINE_ANCHOR_PREFIX = "ann-fine-";

  // Quarto's right-margin sidebar (the "roadmap" / TOC column) is
  // CSS `position: sticky`, so any stroke anchored INSIDE it stays
  // pinned to the viewport while the underlying body scrolls. That
  // creates two annoying symptoms:
  //   1. Eraser strokes drawn over body content but starting in the
  //      sidebar drift away from the pen strokes they were meant
  //      to remove → "erase appears to work, then comes back on
  //      scroll".
  //   2. Notes drawn directly in the sidebar don't follow the
  //      content they're commenting on.
  // Fix: when a click would anchor in the sidebar, redirect the
  // anchor to the closest fine anchor in the main column at the
  // same vertical position. Resulting strokes have fx > 1 (i.e.
  // they render to the right of the anchor rect), which is fine —
  // they appear visually in the sidebar but move with the main
  // column on reflow.
  const SIDEBAR_SELECTOR = "#quarto-margin-sidebar, #TOC";

  function isInSidebar(el) {
    return !!(el && el.closest && el.closest(SIDEBAR_SELECTOR));
  }

  function ensureFineAnchors() {
    let counter = 0;
    for (const el of document.querySelectorAll(FINE_ANCHOR_SELECTOR)) {
      if (el.id) continue;
      if (el.closest("#TOC")) continue;
      if (el.closest("#annotation-toolbar")) continue;
      if (el.closest("#annotation-canvas")) continue;
      counter++;
      el.id = FINE_ANCHOR_PREFIX + counter;
    }
    if (counter > 0 && window.console) {
      console.info(
        "[annotation v4] ensureFineAnchors: assigned " + counter +
        " synthetic ids (" + FINE_ANCHOR_PREFIX + "1.." +
        FINE_ANCHOR_PREFIX + counter + ") to leaf layout blocks " +
        "so strokes anchor to paragraphs / list-items / summaries " +
        "instead of whole sections."
      );
    }
    // Newly added ids invalidate any cached anchor list.
    anchorListCache = null;
  }

  function isContentAnchor(el) {
    if (!el || !el.id) return false;
    if (ANCHOR_IGNORE_IDS.has(el.id)) return false;
    for (const pre of ANCHOR_IGNORE_PREFIXES) {
      if (el.id.startsWith(pre)) return false;
    }
    if (el.closest && el.closest("#TOC")) return false;
    return true;
  }

  function getAnchorList() {
    if (anchorListCache) return anchorListCache;
    const out = [];
    for (const el of document.querySelectorAll("[id]")) {
      if (isContentAnchor(el)) out.push(el);
    }
    anchorListCache = out;
    return out;
  }

  function findNearestAnchorAbove(absX, absY) {
    const list = getAnchorList();
    let best = null;
    let bestTop = -Infinity;
    for (const el of list) {
      const r = el.getBoundingClientRect();
      if (r.width === 0 && r.height === 0) continue;
      const top = r.top + window.scrollY;
      // Allow tiny slop so a point landing exactly on the anchor's
      // top still picks it.
      if (top <= absY + 4 && top > bestTop) {
        best = el;
        bestTop = top;
      }
    }
    if (!best) return null;
    const r = best.getBoundingClientRect();
    return {
      id: best.id,
      top: r.top + window.scrollY,
      left: r.left + window.scrollX,
      width: r.width,
      height: r.height,
    };
  }

  // ── v4 anchor lookup ──────────────────────────────────────────
  // findContainingAnchor: the deepest [id]-bearing element whose
  //   bounding box covers (clientX, clientY). Returns the element
  //   so the caller can compute a fresh getBoundingClientRect() for
  //   fractional-coord arithmetic. This is the preferred anchor
  //   because the stroke's first point is GUARANTEED to lie inside
  //   it, giving fractional coords in [0, 1]² (well-defined even
  //   if the anchor reflows to a slightly different shape).
  function findContainingAnchor(clientX, clientY) {
    let elements = [];
    if (document.elementsFromPoint) {
      elements = document.elementsFromPoint(clientX, clientY);
    } else {
      const single = document.elementFromPoint(clientX, clientY);
      if (single) elements = [single];
    }
    for (const target of elements) {
      if (!target) continue;
      // Skip our own annotation overlay / toolbar layers.
      if (target === canvas) continue;
      if (target.id === "annotation-toolbar" ||
          target.id === "annotation-canvas") continue;
      if (target.closest && target.closest("#annotation-toolbar")) continue;
      let cur = target;
      while (cur && cur !== document.body) {
        if (cur.id && isContentAnchor(cur)) {
          const r = cur.getBoundingClientRect();
          if (r.width > 0 && r.height > 0) return cur;
        }
        cur = cur.parentElement;
      }
    }
    return null;
  }

  // findMainColumnAnchorAtY: pick the closest fine-anchor element
  // in the MAIN body column (i.e. NOT inside the right margin
  // sidebar / TOC) by vertical distance to clientY. Used by the
  // sidebar redirect logic so a stroke drawn over the roadmap is
  // anchored to the body paragraph it visually relates to.
  //
  // Cost: O(N_fine_anchors) per call. We only call this once per
  // pointerdown when the click landed in the sidebar, so it's
  // cheap enough.
  function findMainColumnAnchorAtY(clientY) {
    const fine = document.querySelectorAll(
      "[id^='" + FINE_ANCHOR_PREFIX + "']"
    );
    let best = null;
    let bestDist = Infinity;
    for (const el of fine) {
      if (isInSidebar(el)) continue;
      const r = el.getBoundingClientRect();
      if (r.width <= 0 || r.height <= 0) continue;
      let dist;
      if (clientY < r.top)         dist = r.top - clientY;
      else if (clientY > r.bottom) dist = clientY - r.bottom;
      else                         dist = 0;
      if (dist < bestDist) { bestDist = dist; best = el; }
    }
    return best;
  }

  // findOverlappingStrokeAt: return the topmost (latest-drawn)
  // pen / highlighter stroke whose any point lies within `radius`
  // viewport-pixels of (clientX, clientY). Used by the eraser so
  // it inherits the SAME anchor as the stroke it's about to cover
  // — that keeps the eraser and target locked together through any
  // subsequent scroll / toggle reflow, instead of drifting apart

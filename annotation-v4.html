<!--
  annotation-v4.html — Pen-tablet annotation overlay for Quarto HTML
  -----------------------------------------------------------------
  Experimental v4 layout-relative variant of annotation.html.
  Currently injected via per-document YAML override on
  4th-handout.qmd; other handouts continue to use annotation.html.

  WHAT'S NEW IN v4 (vs v3 in annotation.html)
  -------------------------------------------
  Storage format: each stroke point is stored as fractional
  coordinates (fx, fy) ∈ [0, 1]² *inside* the smallest [id]-bearing
  ancestor element at the draw point. At render time we look up the
  anchor by id, get its current getBoundingClientRect(), and compute:

      viewport_x = anchor.left + fx * anchor.width
      viewport_y = anchor.top  + fy * anchor.height

  Why this is the right primitive (per W3C/PDF.js community
  consensus — see 2026 search "html canvas annotation overlay
  browser zoom relative coordinates"):
    • Browser page-zoom: anchor.width / .height scale uniformly,
      so (fx, fy) maps to the correct visual location automatically.
      No scale factor to compute.
    • Stroke thickness ALSO scales with zoom:
          lineWidth = savedWidth * (currentAnchorWidth / savedAnchorWidth)
      → notes feel like part of the underlying document content.
    • Window resize / responsive reflow: anchor reflows with content;
      the fractional location stays meaningful.
    • Cross-machine font drift: anchor's aspect ratio may shift
      slightly (e.g. text wraps to one extra line), which stretches
      strokes proportionally — best-effort but tolerant.

  Backward compatibility
  ----------------------
    • Loading a v3 JSON: in-memory conversion to v4 happens at load
      time (anchor.left/top + width/height + saved doc-coords →
      fractional). No re-save needed for the strokes to render
      correctly.
    • Loading a v2 JSON (legacy unanchored): rendered as raw
      doc-coords (zoom-fragile); the next Save .json upgrades them
      to v4 if anchors can be found.
    • Saved files are always v4.

  • Vanilla JS only (no external dependencies)
  • Pointer Events API (mouse / pen / touch all unified)
  • Toolbar: cursor / pen / highlighter / eraser / color / width /
    undo / clear / save / load
  • Toggle ON/OFF: when OFF, scrolling and clicks pass through normally
  • Cursor tool: keeps annotation mode ON (existing strokes stay
    visible) but lets the page handle pointer events again so the
    user can scroll, click links, use the TOC, etc.
  • Toolbar is draggable via the ⋮⋮ grip; can be hidden via the ✕
    button (a small ✏ launcher appears at top-right while hidden).
    Position and visibility persist across reloads via localStorage.
  • Tested on Chrome / Edge (Mac & Windows)
  Keyboard shortcuts (when ON unless noted):
      Alt+A             toggle annotation mode (works also when OFF)
      Alt+T             toggle TOOLBAR visibility (works also when OFF)
      C / P / H / E     select cursor / pen / highlighter / eraser
      Cmd/Ctrl+Z        undo
      Esc               turn annotation OFF
-->
<script>
(function () {
  "use strict";

  // ── Coexistence with annotation.html (v3) ─────────────────────
  // Quarto's include-after-body MERGES project-level and document-
  // level entries (rather than replacing), so when a handout opts
  // into v4 via document YAML, BOTH annotation.html and
  // annotation-v4.html end up injected. Without coordination, v3
  // would create #annotation-canvas first and v4's init() would
  // bail (its existing guard is `if (#annotation-canvas) return`).
  //
  // The fix: we set this flag synchronously as v4's IIFE runs.
  // annotation.html (v3) was patched to defer its init to a
  // microtask and bail when this flag is set, so v4 wins on any
  // page that loads both files.
  window.__ANNOTATION_V4_ACTIVE__ = true;

  const COLORS = [
    { name: "black",  value: "#111827" },
    { name: "red",    value: "#dc2626" },
    { name: "blue",   value: "#2563eb" },
    { name: "green",  value: "#059669" },
    { name: "yellow", value: "#facc15" },
  ];
  const WIDTHS = [
    { name: "thin",     value: 2 },
    { name: "medium",   value: 4 },
    { name: "thick",    value: 8 },
    { name: "x-large",  value: 16 },
    { name: "huge",     value: 32 },
    { name: "giant",    value: 56 },
  ];
  // "cursor" is a non-drawing tool: it keeps annotation mode ON
  // (existing strokes stay visible) but lets the page receive pointer
  // events again, so the user can scroll, click links, use the TOC,
  // etc. without first turning annotation OFF.
  const TOOLS = ["cursor", "pen", "highlighter", "eraser"];

  // Default stroke width for each tool (must be a value present in WIDTHS).
  // "cursor" intentionally has no entry — switching to cursor leaves
  // the previously selected width unchanged.
  const DEFAULT_WIDTH = {
    pen: 4,
    highlighter: 16,
    eraser: 32,
  };
  // Highlighter: how transparent strokes should look.
  const HIGHLIGHTER_ALPHA = 0.35;

  // localStorage keys (versioned in case the format changes later).
  const STORAGE_POS_KEY = "annotation-toolbar-pos-v1";
  const STORAGE_VIS_KEY = "annotation-toolbar-visible-v1";

  let enabled = false;
  let tool = "pen";
  let color = COLORS[0].value;
  let width = DEFAULT_WIDTH.pen;
  let drawing = false;
  let strokes = [];
  let currentStroke = null;
  let canvas, ctx, toolbar;
  // The small "✏" launcher that re-opens the toolbar after it has been
  // hidden via the ✕ button or Alt+T.
  let showBtn = null;
  // Drag state for moving the toolbar around the viewport.
  let toolbarDragging = false;
  let toolbarDragStartClient = null;
  let toolbarDragStartLeft = 0;
  let toolbarDragStartTop = 0;
  // Per-tool color memory: switching tools restores the last color used
  // with that tool. Pen defaults to black, highlighter to yellow.
  // Cursor is non-drawing → ignores color.
  const TOOL_COLOR = {
    cursor: null,                 // cursor ignores color
    pen: COLORS[0].value,         // black
    highlighter: COLORS[4].value, // yellow
    eraser: null,                 // eraser ignores color
  };

  function el(tag, props = {}, children = []) {
    const node = document.createElement(tag);
    Object.entries(props).forEach(([k, v]) => {
      if (k === "style") Object.assign(node.style, v);
      else if (k.startsWith("on")) node.addEventListener(k.slice(2), v);
      else node.setAttribute(k, v);
    });
    (Array.isArray(children) ? children : [children]).forEach(c => {
      if (c == null) return;
      node.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
    });
    return node;
  }

  function makeCanvas() {
    const c = el("canvas", {
      id: "annotation-canvas",
      style: {
        position: "fixed",
        top: "0",
        left: "0",
        // Width/height are set in JS (resizeCanvas) so we can use
        // documentElement.clientWidth/Height — which EXCLUDES the
        // browser scrollbar. Why this matters: with touch-action:
        // none, Edge on Windows touch devices renders a "no-scroll
        // here" hint (the scrollbar appears dashed/ghosted) on any
        // touch-action:none element that overlaps the scrollbar
        // area. Keeping the canvas inside the content area only
        // leaves the scrollbar fully solid and interactable.
        zIndex: "2147483646",
        pointerEvents: "none",
        // Default touch-action allows the page to be scrolled (pan-y)
        // and pinch-zoomed with the user's finger even while a drawing
        // tool is active. We then dynamically downgrade to "none" for
        // the brief window where a pen pointer is in proximity to the
        // canvas (see pointerenter/pointerleave handlers in init), so
        // that vertical pen strokes can't be hijacked by the browser
        // as a scroll gesture on Surface-class devices.
        //
        // Pointer-type policy:
        //   • pen   → drawing (touch-action flips to "none" via hover)
        //   • mouse → drawing (touch-action does not gate mouse)
        //   • touch → scroll / pinch-zoom (filtered out of drawing
        //             handlers by isDrawingPointer)
        touchAction: "pan-y pinch-zoom",
        background: "transparent",
        cursor: "crosshair",
        display: "none",
        // Suppress any user-agent focus outline; the canvas can be
        // implicitly focused while drawing on some browsers and a
        // dashed outline at the viewport edge is visually distracting.
        outline: "none",
      },
    });
    document.body.appendChild(c);
    return c;
  }

  function resizeCanvas() {
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    // documentElement.clientWidth/Height = viewport CSS px MINUS
    // the browser scrollbar (when it's present). We deliberately
    // do not use window.innerWidth/innerHeight here because those
    // include the scrollbar area on Chrome / Edge, which would
    // cause the canvas to overlap it (see makeCanvas comment).
    const cssW = document.documentElement.clientWidth;
    const cssH = document.documentElement.clientHeight;
    canvas.style.width  = cssW + "px";
    canvas.style.height = cssH + "px";
    canvas.width  = Math.floor(cssW * dpr);
    canvas.height = Math.floor(cssH * dpr);
    ctx = canvas.getContext("2d");
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    redraw();
  }

  function redraw() {
    if (!ctx) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // Per-redraw cache of anchor positions: at most one
    // getBoundingClientRect per unique anchor id. Browser zoom or
    // window resize will fire a fresh redraw, so the cache always
    // reflects the current layout.
    const anchorCache = new Map();
    for (const s of strokes) drawStroke(s, anchorCache);
  }

  // v4 strokes carry anchor-relative fractional coordinates
  // (fx, fy) ∈ [0, 1]² of the anchor element's bounding box. At
  // render time we re-fetch the anchor's current rect and convert
  // back to viewport pixels. Browser zoom and reflow are absorbed
  // for free because both the anchor and the viewport coordinates
  // come from the SAME live layout snapshot.
  //
  // Stroke thickness scales with zoom too:
  //     lineWidth = savedWidth * (anchorNow.width / anchorSaved.width)
  // so notes thicken when zoomed in (matching how the underlying
  // text gets bigger), instead of staying a fixed CSS-px size.
  //
  // Legacy unanchored (v2) strokes hold raw doc-coord points and
  // render via a translation-only fallback (zoom-fragile, but
  // preserved for backward compatibility while loading old files).
  function drawStroke(s, anchorCache) {
    if (!s.points || s.points.length === 0) return;
    const sx = window.scrollX, sy = window.scrollY;

    let rect = null;
    let scale = 1.0;
    if (s.anchor && s.anchor.id) {
      if (anchorCache && anchorCache.has(s.anchor.id)) {
        rect = anchorCache.get(s.anchor.id);
      } else {
        const el = document.getElementById(s.anchor.id);
        if (el) {
          const r = el.getBoundingClientRect();
          if (r.width > 0 && r.height > 0) {
            rect = { left: r.left, top: r.top, width: r.width, height: r.height };
          }
        }
        if (anchorCache) anchorCache.set(s.anchor.id, rect);
      }
      if (rect && s.anchor.savedWidth > 0) {
        scale = rect.width / s.anchor.savedWidth;
        // Clamp sub-pixel noise to identity to keep the stroke
        // visually stable when the layout hasn't actually changed.
        if (Math.abs(scale - 1) < 0.005) scale = 1;
      }
    }

    ctx.save();
    if (s.tool === "eraser") {
      ctx.globalCompositeOperation = "destination-out";
      ctx.strokeStyle = "rgba(0,0,0,1)";
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
    } else if (s.tool === "highlighter") {
      ctx.globalCompositeOperation = "source-over";
      ctx.globalAlpha = HIGHLIGHTER_ALPHA;
      ctx.strokeStyle = s.color;
      // Flat caps so overlapping segments don't pile up at joints.
      ctx.lineCap = "butt";
      ctx.lineJoin = "round";
    } else {
      ctx.globalCompositeOperation = "source-over";
      ctx.strokeStyle = s.color;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
    }
    ctx.lineWidth = (s.width || 4) * scale;
    ctx.beginPath();
    const [p0, ...rest] = s.points;
    const isFractional = (p0.fx !== undefined);
    if (rect && isFractional) {
      // v4 path: fractional → viewport via current anchor rect.
      ctx.moveTo(rect.left + p0.fx * rect.width, rect.top + p0.fy * rect.height);
      for (const p of rest) {
        ctx.lineTo(rect.left + p.fx * rect.width, rect.top + p.fy * rect.height);
      }
    } else if (isFractional) {
      // v4 stroke whose anchor element no longer exists on the
      // page — skip silently. (Logged once per anchor at load time.)
      ctx.restore();
      return;
    } else {
      // Legacy v2 unanchored — render at saved doc coords.
      ctx.moveTo(p0.x - sx, p0.y - sy);
      for (const p of rest) ctx.lineTo(p.x - sx, p.y - sy);
    }
    ctx.stroke();
    ctx.restore();
  }

  // Touch (finger) is intentionally ignored so the user can still
  // scroll the page with a finger swipe while annotation is ON.
  // Pen and mouse always draw.
  function isDrawingPointer(e) {
    return e.pointerType !== "touch";
  }

  function onPointerDown(e) {
    if (!enabled) return;
    if (!isDrawingPointer(e)) return;
    if (e.button !== undefined && e.button !== 0) return;
    e.preventDefault();
    canvas.setPointerCapture(e.pointerId);
    drawing = true;
    const w = (e.pointerType === "pen" && e.pressure > 0)
      ? Math.max(1, width * (e.pressure * 1.5 + 0.4))
      : width;

    // v4: pin the stroke to the smallest [id]-bearing element under
    // the pointer (preferred), or fall back to the nearest [id]
    // above when the click landed on margins / unnamed wrappers.
    const anchorEl = findContainingAnchor(e.clientX, e.clientY)
                  || findFallbackAnchorElement(e.clientX, e.clientY);
    if (anchorEl) {
      const r = anchorEl.getBoundingClientRect();
      currentStroke = {
        v: 4,
        tool, color, width: w,
        anchor: {
          id: anchorEl.id,
          savedWidth:  r.width,
          savedHeight: r.height,
        },
        points: [{
          fx: (e.clientX - r.left) / r.width,
          fy: (e.clientY - r.top)  / r.height,
          p: e.pressure || 0.5,
        }],
      };
    } else {
      // No usable anchor on the entire page — extremely unusual.
      // Fall back to legacy v2 doc-coord storage; the stroke will
      // render via the no-anchor fallback in drawStroke.
      currentStroke = {
        tool, color, width: w,
        anchor: null,
        points: [{
          x: e.clientX + window.scrollX,
          y: e.clientY + window.scrollY,
          p: e.pressure || 0.5,
        }],
      };
    }
    strokes.push(currentStroke);
  }
  function onPointerMove(e) {
    if (!enabled || !drawing) return;
    if (!isDrawingPointer(e)) return;
    e.preventDefault();
    const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];

    // Number of new points this callback adds. We need this to draw
    // a CONNECTED path covering ALL of them — not just the last
    // segment — otherwise fast strokes (where the browser coalesces
    // multiple pointermoves) end up with visible gaps and look like
    // a dashed line. (The redraw() path used by zoom/resize hides
    // the bug because it walks every point in one beginPath, which
    // is exactly what we now do here too.)
    const newCount = events.length;
    if (newCount === 0) return;

    if (currentStroke.v === 4) {
      // Re-fetch the anchor's current rect on every move so the
      // stroke "rides" the anchor even if the user scrolls / zooms
      // mid-stroke (rare, but free to support).
      const anchorEl = document.getElementById(currentStroke.anchor.id);
      if (!anchorEl) return;
      const r = anchorEl.getBoundingClientRect();
      if (r.width <= 0 || r.height <= 0) return;
      for (const ev of events) {
        currentStroke.points.push({
          fx: (ev.clientX - r.left) / r.width,
          fy: (ev.clientY - r.top)  / r.height,
          p: ev.pressure || 0.5,
        });
      }
      const pts = currentStroke.points;
      if (pts.length < 2) return;

      if (currentStroke.tool === "highlighter") {
        redraw();
        return;
      }
      ctx.save();
      if (currentStroke.tool === "eraser") {
        ctx.globalCompositeOperation = "destination-out";
        ctx.strokeStyle = "rgba(0,0,0,1)";
      } else {
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = currentStroke.color;
      }
      // Mid-stroke: anchor's current rect equals the saved rect, so
      // scale = 1 and lineWidth equals the captured width.
      ctx.lineWidth = currentStroke.width;
      ctx.beginPath();
      // startIdx = the LAST point already drawn before this callback
      // (i.e. the point right before the first new one). Drawing
      // moveTo(startIdx) → lineTo(...all new points...) makes the
      // new sub-path connect cleanly to the strokes already painted.
      const startIdx = Math.max(0, pts.length - newCount - 1);
      const start = pts[startIdx];
      ctx.moveTo(r.left + start.fx * r.width, r.top + start.fy * r.height);
      for (let i = startIdx + 1; i < pts.length; i++) {
        const p = pts[i];
        ctx.lineTo(r.left + p.fx * r.width, r.top + p.fy * r.height);
      }
      ctx.stroke();
      ctx.restore();
    } else {
      // Legacy unanchored fallback — doc-coord live drawing.
      const sx = window.scrollX, sy = window.scrollY;
      for (const ev of events) {
        currentStroke.points.push({
          x: ev.clientX + sx, y: ev.clientY + sy, p: ev.pressure || 0.5,
        });
      }
      const pts = currentStroke.points;
      if (pts.length < 2) return;
      if (currentStroke.tool === "highlighter") { redraw(); return; }
      ctx.save();
      if (currentStroke.tool === "eraser") {
        ctx.globalCompositeOperation = "destination-out";
        ctx.strokeStyle = "rgba(0,0,0,1)";
      } else {
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = currentStroke.color;
      }
      ctx.lineWidth = currentStroke.width;
      ctx.beginPath();
      const startIdx = Math.max(0, pts.length - newCount - 1);
      ctx.moveTo(pts[startIdx].x - sx, pts[startIdx].y - sy);
      for (let i = startIdx + 1; i < pts.length; i++) {
        ctx.lineTo(pts[i].x - sx, pts[i].y - sy);
      }
      ctx.stroke();
      ctx.restore();
    }
  }
  function onPointerUp(e) {
    if (!enabled || !drawing) return;
    if (!isDrawingPointer(e)) return;
    e.preventDefault();
    drawing = false;
    currentStroke = null;
    try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
  }

  const TOOLBAR_BTN_STYLE = {
    border: "1px solid #d1d5db",
    background: "#ffffff",
    color: "#111827",
    padding: "4px 10px",
    borderRadius: "6px",
    cursor: "pointer",
    font: "13px/1.2 system-ui, -apple-system, sans-serif",
    minWidth: "32px",
  };

  function makeBtn(label, onClick, opts = {}) {
    return el("button", {
      type: "button",
      title: opts.title || label,
      style: { ...TOOLBAR_BTN_STYLE, ...(opts.style || {}) },
      onclick: onClick,
    }, label);
  }

  function makeToolbar() {
    const bar = el("div", {
      id: "annotation-toolbar",
      style: {
        position: "fixed",
        top: "12px",
        right: "12px",
        zIndex: "2147483647",
        display: "flex",
        flexWrap: "wrap",
        gap: "6px",
        padding: "8px 10px",
        background: "rgba(255,255,255,0.96)",
        border: "1px solid #d1d5db",
        borderRadius: "10px",
        boxShadow: "0 4px 14px rgba(0,0,0,0.10)",
        font: "13px/1.2 system-ui, -apple-system, sans-serif",
        alignItems: "center",
        userSelect: "none",
      },
    });

    // ── Drag handle ────────────────────────────────────────────
    // A small "⋮⋮" grip the user can grab to move the whole toolbar
    // anywhere on the viewport. We use Pointer Events so mouse, pen and
    // touch all work; the resulting position is persisted to
    // localStorage so it survives page reloads.
    const dragHandle = el("div", {
      id: "annotation-drag-handle",
      title: "Drag to move toolbar",
      style: {
        cursor: "grab",
        padding: "2px 6px",
        color: "#6b7280",
        font: "16px/1 system-ui, -apple-system, sans-serif",
        userSelect: "none",
        touchAction: "none",
      },
    }, "⋮⋮");

    dragHandle.addEventListener("pointerdown", (e) => {
      if (e.button !== undefined && e.button !== 0) return;
      const rect = bar.getBoundingClientRect();
      // Convert any right/bottom-anchored placement to absolute
      // top/left so we can move it freely from here on.
      bar.style.right = "auto";
      bar.style.bottom = "auto";
      bar.style.left = rect.left + "px";
      bar.style.top = rect.top + "px";
      toolbarDragging = true;
      toolbarDragStartClient = { x: e.clientX, y: e.clientY };
      toolbarDragStartLeft = rect.left;
      toolbarDragStartTop = rect.top;
      dragHandle.style.cursor = "grabbing";
      try { dragHandle.setPointerCapture(e.pointerId); } catch (_) {}
      e.preventDefault();
    });
    dragHandle.addEventListener("pointermove", (e) => {
      if (!toolbarDragging) return;
      const dx = e.clientX - toolbarDragStartClient.x;
      const dy = e.clientY - toolbarDragStartClient.y;
      bar.style.left = (toolbarDragStartLeft + dx) + "px";
      bar.style.top  = (toolbarDragStartTop  + dy) + "px";
      clampToolbarPosition();
      e.preventDefault();
    });
    const endToolbarDrag = (e) => {
      if (!toolbarDragging) return;
      toolbarDragging = false;
      dragHandle.style.cursor = "grab";
      saveToolbarPosition();
      try { dragHandle.releasePointerCapture(e.pointerId); } catch (_) {}
    };
    dragHandle.addEventListener("pointerup", endToolbarDrag);
    dragHandle.addEventListener("pointercancel", endToolbarDrag);

    const onOff = makeBtn("✏ Annotate: OFF", () => setEnabled(!enabled), {
      style: { background: "#f3f4f6", fontWeight: "600" },
    });
    onOff.id = "annotation-toggle";

    const cursorBtn = makeBtn("↖ Cursor", () => setTool("cursor"), {
      title: "Cursor — interact with the page (scroll, click, TOC). " +
             "Drawings remain visible. (C)",
    });
    const penBtn = makeBtn("Pen", () => setTool("pen"));
    const hlBtn = makeBtn("Highlighter", () => setTool("highlighter"));
    const eraserBtn = makeBtn("Eraser", () => setTool("eraser"));
    cursorBtn.id = "annotation-cursor";
    penBtn.id = "annotation-pen";
    hlBtn.id = "annotation-highlighter";
    eraserBtn.id = "annotation-eraser";

    const colorWrap = el("div", {
      // The selected swatch is highlighted with a thicker blue
      // outline + offset (see updateColorPalette). Adding small
      // horizontal padding keeps the highlight from being clipped
      // when the leftmost / rightmost swatch is the selected one.
      style: { display: "flex", gap: "8px", padding: "0 4px" },
    });
    COLORS.forEach(c => {
      const sw = el("button", {
        type: "button",
        title: c.name,
        "data-color": c.value,
        // Stable hook used by updateColorPalette() to apply the
        // "selected" indicator across all swatches whenever the
        // current color changes.
        "data-annotation-color": c.value,
        style: {
          width: "22px", height: "22px",
          background: c.value,
          border: "2px solid #ffffff",
          outline: "1px solid #9ca3af",
          outlineOffset: "0",
          borderRadius: "50%",
          cursor: "pointer",
          padding: "0",
        },
        onclick: () => setColor(c.value),
      });
      colorWrap.appendChild(sw);
    });

    const widthSel = el("select", {
      title: "stroke width",
      style: { ...TOOLBAR_BTN_STYLE, padding: "4px 6px" },
      onchange: (e) => setWidth(Number(e.target.value)),
    });
    WIDTHS.forEach(w => {
      const opt = el("option", { value: String(w.value) }, w.name + " (" + w.value + "px)");
      if (w.value === width) opt.setAttribute("selected", "selected");
      widthSel.appendChild(opt);
    });
    widthSel.id = "annotation-width";

    const undoBtn = makeBtn("Undo", undo);
    const clearBtn = makeBtn("Clear", () => {
      if (strokes.length && confirm("Clear all annotations?")) {
        strokes = [];
        redraw();
      }
    });

    const saveBtn = makeBtn("Save .json", saveJson);
    const loadBtn = makeBtn("Load .json", () => pickAndLoad());
    // Hidden legacy <input type=file> as fallback for browsers / contexts
    // (Safari, Firefox, file://) where showOpenFilePicker is unavailable.
    const fileInput = el("input", {
      type: "file",
      accept: "application/json,.json",
      style: { display: "none" },
      onchange: (e) => {
        const f = e.target.files && e.target.files[0];
        if (f) loadJson(f);
        e.target.value = "";
      },
    });

    const sep = () => el("span", {
      style: {
        display: "inline-block",
        width: "1px", height: "22px",
        background: "#e5e7eb", margin: "0 2px",
      },
    });

    // ── Hide button ────────────────────────────────────────────
    // Collapses the toolbar entirely; a small "✏" launcher (built in
    // makeShowButton) appears at top-right so the user can bring it
    // back. Visibility state is persisted to localStorage.
    const hideBtn = makeBtn("✕", () => setToolbarVisible(false), {
      title: "Hide toolbar (Alt+T)",
      style: { padding: "4px 8px", fontWeight: "600", color: "#6b7280" },
    });
    hideBtn.id = "annotation-hide";

    bar.appendChild(dragHandle);
    bar.appendChild(onOff);
    bar.appendChild(sep());
    bar.appendChild(cursorBtn);
    bar.appendChild(penBtn);
    bar.appendChild(hlBtn);
    bar.appendChild(eraserBtn);
    bar.appendChild(sep());
    bar.appendChild(colorWrap);
    bar.appendChild(widthSel);
    bar.appendChild(sep());
    bar.appendChild(undoBtn);
    bar.appendChild(clearBtn);
    bar.appendChild(sep());
    bar.appendChild(saveBtn);
    bar.appendChild(loadBtn);
    bar.appendChild(fileInput);
    bar.appendChild(sep());
    bar.appendChild(hideBtn);

    document.body.appendChild(bar);
    return bar;
  }

  // ── Toolbar position / visibility helpers ──────────────────────
  function clampToolbarPosition() {
    if (!toolbar) return;
    // Only clamp when the user has actually positioned the toolbar
    // via left/top (i.e. dragged or restored). The default
    // top/right anchor handles itself.
    if (!toolbar.style.left || !toolbar.style.top) return;
    const margin = 4;
    const w = toolbar.offsetWidth;
    const h = toolbar.offsetHeight;
    let left = parseFloat(toolbar.style.left);
    let top = parseFloat(toolbar.style.top);
    if (isNaN(left) || isNaN(top)) return;
    left = Math.max(margin, Math.min(window.innerWidth  - w - margin, left));
    top  = Math.max(margin, Math.min(window.innerHeight - h - margin, top));
    toolbar.style.right = "auto";
    toolbar.style.bottom = "auto";
    toolbar.style.left = left + "px";
    toolbar.style.top = top + "px";
  }

  function saveToolbarPosition() {
    if (!toolbar) return;
    try {
      const left = parseFloat(toolbar.style.left);
      const top = parseFloat(toolbar.style.top);
      if (!isNaN(left) && !isNaN(top)) {
        localStorage.setItem(STORAGE_POS_KEY, JSON.stringify({ left, top }));
      }
    } catch (_) {}
  }

  function restoreToolbarPosition() {
    if (!toolbar) return;
    try {
      const raw = localStorage.getItem(STORAGE_POS_KEY);
      if (!raw) return;
      const pos = JSON.parse(raw);
      if (pos && typeof pos.left === "number" && typeof pos.top === "number") {
        toolbar.style.right = "auto";
        toolbar.style.bottom = "auto";
        toolbar.style.left = pos.left + "px";
        toolbar.style.top = pos.top + "px";
        clampToolbarPosition();
      }
    } catch (_) {}
  }

  function setToolbarVisible(on) {
    if (!toolbar) return;
    toolbar.style.display = on ? "flex" : "none";
    if (showBtn) showBtn.style.display = on ? "none" : "flex";
    try { localStorage.setItem(STORAGE_VIS_KEY, on ? "1" : "0"); } catch (_) {}
  }

  function restoreToolbarVisibility() {
    let visible = true;
    try {
      const raw = localStorage.getItem(STORAGE_VIS_KEY);
      if (raw === "0") visible = false;
    } catch (_) {}
    setToolbarVisible(visible);
  }

  // Tiny round "✏" button visible only while the toolbar is hidden,
  // so the user can always bring the toolbar back without remembering
  // the keyboard shortcut.
  function makeShowButton() {
    return el("button", {
      type: "button",
      title: "Show annotation toolbar (Alt+T)",
      style: {
        position: "fixed",
        top: "12px",
        right: "12px",
        zIndex: "2147483647",
        width: "36px",
        height: "36px",
        borderRadius: "50%",
        border: "1px solid #d1d5db",
        background: "rgba(255,255,255,0.96)",
        color: "#111827",
        boxShadow: "0 4px 14px rgba(0,0,0,0.10)",
        cursor: "pointer",
        font: "16px/1 system-ui, -apple-system, sans-serif",
        display: "none",
        alignItems: "center",
        justifyContent: "center",
        padding: "0",
      },
      onclick: () => setToolbarVisible(true),
    }, "✏");
  }

  // Sync the canvas's pointer-events / display with the current
  // (enabled, tool) pair:
  //   • annotation OFF             → canvas hidden, no events
  //   • annotation ON  + cursor    → canvas visible, events pass
  //                                   through to the page
  //   • annotation ON  + drawing   → canvas visible, events captured
  function updateCanvasInteractivity() {
    if (!canvas) return;
    if (!enabled) {
      canvas.style.pointerEvents = "none";
      canvas.style.display = "none";
      return;
    }
    canvas.style.display = "block";
    canvas.style.pointerEvents = (tool === "cursor") ? "none" : "auto";
  }

  function setEnabled(on) {
    enabled = on;
    updateCanvasInteractivity();
    const btn = document.getElementById("annotation-toggle");
    if (btn) {
      btn.textContent = on ? "✏ Annotate: ON" : "✏ Annotate: OFF";
      btn.style.background = on ? "#fef3c7" : "#f3f4f6";
    }
    // Page scrolling stays enabled even while annotating — wheel /
    // trackpad / keyboard / touch (finger) all work, and the strokes
    // follow the page content because they are stored in document
    // coordinates.
  }
  function setTool(t) {
    if (!TOOLS.includes(t)) return;
    // Cancel any in-progress stroke when switching to the
    // non-drawing cursor tool.
    if (t === "cursor" && drawing) {
      drawing = false;
      currentStroke = null;
    }
    tool = t;

    // Restore the per-tool color (eraser/cursor keep the previous
    // pen color internally; they just don't use it).
    if (TOOL_COLOR[tool]) color = TOOL_COLOR[tool];

    // Restore the tool's preferred default stroke width and sync the
    // dropdown so the user can see it. Cursor has no preferred width
    // → leave the previous value untouched.
    if (DEFAULT_WIDTH[tool]) width = DEFAULT_WIDTH[tool];
    const sel = document.getElementById("annotation-width");
    if (sel) sel.value = String(width);

    const c   = document.getElementById("annotation-cursor");
    const p   = document.getElementById("annotation-pen");
    const h   = document.getElementById("annotation-highlighter");
    const e2  = document.getElementById("annotation-eraser");
    if (c)  c.style.outline  = tool === "cursor"      ? "2px solid #2563eb" : "none";
    if (p)  p.style.outline  = tool === "pen"         ? "2px solid #2563eb" : "none";
    if (h)  h.style.outline  = tool === "highlighter" ? "2px solid #2563eb" : "none";
    if (e2) e2.style.outline = tool === "eraser"      ? "2px solid #2563eb" : "none";

    updateCursor();
    updateCanvasInteractivity();
    // Tool switch also restored a per-tool color above; reflect it
    // in the palette indicator.
    updateColorPalette();
  }
  function setColor(c) {
    color = c;
    // Remember per-tool so switching back restores it.
    if (tool === "pen" || tool === "highlighter") TOOL_COLOR[tool] = c;
    updateCursor();
    updateColorPalette();
  }

  // Visually mark the currently active color in the palette by
  // giving it a thick blue ring (matching the highlight used on the
  // active tool button). All other swatches revert to the default
  // 1px gray outline.
  function updateColorPalette() {
    const swatches = document.querySelectorAll(
      "#annotation-toolbar [data-annotation-color]"
    );
    swatches.forEach(sw => {
      const isSelected = sw.getAttribute("data-annotation-color") === color;
      if (isSelected) {
        sw.style.outline = "3px solid #2563eb";
        sw.style.outlineOffset = "2px";
      } else {
        sw.style.outline = "1px solid #9ca3af";
        sw.style.outlineOffset = "0";
      }
    });
  }
  function setWidth(w) {
    width = w;
    // Remember per-tool so switching back restores it.
    DEFAULT_WIDTH[tool] = w;
    updateCursor();
  }

  // Build a custom cursor that reflects the active tool & stroke width:
  //   pen         → solid circle (outlined)
  //   highlighter → rectangle (flat marker tip)
  //   eraser      → dashed circle
  // Each shape is a tiny SVG inlined as a data URL, with a white halo so
  // it stays visible on both light and dark backgrounds.
  function updateCursor() {
    if (!canvas) return;
    // Cursor tool: the canvas does not capture pointer events, so its
    // own cursor is moot. Reset to default for tidiness.
    if (tool === "cursor") {
      canvas.style.cursor = "default";
      return;
    }
    const MIN_VIS = 10;
    const MAX_VIS = 96;            // browser cursor size sanity cap
    const visW = Math.min(MAX_VIS, Math.max(MIN_VIS, width));
    let svg, size, hotX, hotY;

    if (tool === "pen") {
      const r = visW / 2;
      size = visW + 4;
      const c = size / 2;
      svg = "<svg xmlns='http://www.w3.org/2000/svg' width='" + size + "' height='" + size + "' viewBox='0 0 " + size + " " + size + "'>"
          + "<circle cx='" + c + "' cy='" + c + "' r='" + r + "' fill='none' stroke='white' stroke-width='3'/>"
          + "<circle cx='" + c + "' cy='" + c + "' r='" + r + "' fill='none' stroke='" + color + "' stroke-width='1.5'/>"
          + "<circle cx='" + c + "' cy='" + c + "' r='1.2' fill='" + color + "'/>"
          + "</svg>";
      hotX = hotY = c;
    } else if (tool === "highlighter") {
      const rectW = visW;
      const rectH = Math.max(6, Math.round(visW / 2));
      size = Math.max(rectW, rectH) + 4;
      const cx = size / 2, cy = size / 2;
      const x = cx - rectW / 2, y = cy - rectH / 2;
      svg = "<svg xmlns='http://www.w3.org/2000/svg' width='" + size + "' height='" + size + "' viewBox='0 0 " + size + " " + size + "'>"
          + "<rect x='" + (x - 1) + "' y='" + (y - 1) + "' width='" + (rectW + 2) + "' height='" + (rectH + 2) + "' fill='none' stroke='white' stroke-width='3'/>"
          + "<rect x='" + x + "' y='" + y + "' width='" + rectW + "' height='" + rectH + "' fill='" + color + "' fill-opacity='0.30' stroke='" + color + "' stroke-width='1.5'/>"
          + "</svg>";
      hotX = hotY = cx;
    } else {
      // eraser → dashed circle (white halo + dark gray dashes)
      const r = visW / 2;
      size = visW + 4;
      const c = size / 2;
      svg = "<svg xmlns='http://www.w3.org/2000/svg' width='" + size + "' height='" + size + "' viewBox='0 0 " + size + " " + size + "'>"
          + "<circle cx='" + c + "' cy='" + c + "' r='" + r + "' fill='none' stroke='white' stroke-width='3' stroke-dasharray='5 4'/>"
          + "<circle cx='" + c + "' cy='" + c + "' r='" + r + "' fill='none' stroke='#1f2937' stroke-width='1.5' stroke-dasharray='5 4'/>"
          + "</svg>";
      hotX = hotY = c;
    }

    const enc = encodeURIComponent(svg);
    canvas.style.cursor = 'url("data:image/svg+xml;utf8,' + enc + '") '
                        + hotX + ' ' + hotY + ', crosshair';
  }

  function undo() {
    if (strokes.length === 0) return;
    strokes.pop();
    redraw();
  }

  // ── Content anchors ────────────────────────────────────────────
  // Each stroke is pinned to the nearest [id]-bearing content
  // element above its starting point. On load we re-find that
  // element by id and translate the whole stroke by the difference
  // between the saved anchor position and the anchor's current
  // position — which absorbs cross-machine font drift far more
  // accurately than a linear document-height rescale.
  const ANCHOR_IGNORE_PREFIXES = ["annotation-"];
  const ANCHOR_IGNORE_IDS = new Set([
    "TOC",
    "title-block-header",
    "quarto-document-content",
  ]);
  let anchorListCache = null;

  function isContentAnchor(el) {
    if (!el || !el.id) return false;
    if (ANCHOR_IGNORE_IDS.has(el.id)) return false;
    for (const pre of ANCHOR_IGNORE_PREFIXES) {
      if (el.id.startsWith(pre)) return false;
    }
    if (el.closest && el.closest("#TOC")) return false;
    return true;
  }

  function getAnchorList() {
    if (anchorListCache) return anchorListCache;
    const out = [];
    for (const el of document.querySelectorAll("[id]")) {
      if (isContentAnchor(el)) out.push(el);
    }
    anchorListCache = out;
    return out;
  }

  function findNearestAnchorAbove(absX, absY) {
    const list = getAnchorList();
    let best = null;
    let bestTop = -Infinity;
    for (const el of list) {
      const r = el.getBoundingClientRect();
      if (r.width === 0 && r.height === 0) continue;
      const top = r.top + window.scrollY;
      // Allow tiny slop so a point landing exactly on the anchor's
      // top still picks it.
      if (top <= absY + 4 && top > bestTop) {
        best = el;
        bestTop = top;
      }
    }
    if (!best) return null;
    const r = best.getBoundingClientRect();
    return {
      id: best.id,
      top: r.top + window.scrollY,
      left: r.left + window.scrollX,
      width: r.width,
      height: r.height,
    };
  }

  // ── v4 anchor lookup ──────────────────────────────────────────
  // findContainingAnchor: the deepest [id]-bearing element whose
  //   bounding box covers (clientX, clientY). Returns the element
  //   so the caller can compute a fresh getBoundingClientRect() for
  //   fractional-coord arithmetic. This is the preferred anchor
  //   because the stroke's first point is GUARANTEED to lie inside
  //   it, giving fractional coords in [0, 1]² (well-defined even
  //   if the anchor reflows to a slightly different shape).
  function findContainingAnchor(clientX, clientY) {
    let elements = [];
    if (document.elementsFromPoint) {
      elements = document.elementsFromPoint(clientX, clientY);
    } else {
      const single = document.elementFromPoint(clientX, clientY);
      if (single) elements = [single];
    }
    for (const target of elements) {
      if (!target) continue;
      // Skip our own annotation overlay / toolbar layers.
      if (target === canvas) continue;
      if (target.id === "annotation-toolbar" ||
          target.id === "annotation-canvas") continue;
      if (target.closest && target.closest("#annotation-toolbar")) continue;
      let cur = target;
      while (cur && cur !== document.body) {
        if (cur.id && isContentAnchor(cur)) {
          const r = cur.getBoundingClientRect();
          if (r.width > 0 && r.height > 0) return cur;
        }
        cur = cur.parentElement;
      }
    }
    return null;
  }

  // findFallbackAnchorElement: same heuristic as
  // findNearestAnchorAbove (nearest [id] preceding the click) but
  // returns the DOM element instead of a saved-anchor object.
  // Used when findContainingAnchor returns null (e.g. user clicked
  // on a margin / wrapper without an [id]).
  function findFallbackAnchorElement(clientX, clientY) {
    const absY = clientY + window.scrollY;
    const list = getAnchorList();
    let best = null;
    let bestTop = -Infinity;
    for (const el of list) {
      const r = el.getBoundingClientRect();
      if (r.width === 0 && r.height === 0) continue;
      const top = r.top + window.scrollY;
      if (top <= absY + 4 && top > bestTop) {
        best = el;
        bestTop = top;
      }
    }
    return best;
  }

  function saveJson() {
    // Best-effort on-save upgrade: convert any legacy v2 unanchored
    // strokes to v4 fractional, using the current layout to find an
    // anchor. The user clicking "Save" implies the strokes currently
    // look aligned with the live page, so it's safe to bake the
    // current anchor rect in as the saved one.
    let attached = 0;
    const strokesOut = strokes.map((s) => {
      if (s.v === 4) return s;
      if (!s.points || s.points.length === 0) return s;
      const p0 = s.points[0];
      if (p0.fx !== undefined) return { ...s, v: 4 };

      // p0.x / p0.y are doc-coords. Convert to viewport (clientX/Y)
      // for elementFromPoint hit-testing.
      const clientX = p0.x - window.scrollX;
      const clientY = p0.y - window.scrollY;
      const el = findContainingAnchor(clientX, clientY)
              || findFallbackAnchorElement(clientX, clientY);
      if (!el) return s;
      const r = el.getBoundingClientRect();
      if (r.width <= 0 || r.height <= 0) return s;
      attached++;
      return {
        v: 4,
        tool: s.tool, color: s.color, width: s.width,
        anchor: { id: el.id, savedWidth: r.width, savedHeight: r.height },
        points: s.points.map(p => ({
          fx: (p.x - (r.left + window.scrollX)) / r.width,
          fy: (p.y - (r.top  + window.scrollY)) / r.height,
          p: p.p,
        })),
      };
    });
    if (attached > 0) {
      strokes = strokesOut;
      if (window.console) {
        console.info(
          "[annotation v4] On-save upgrade: anchored=" + attached +
          " — file is now zoom-robust."
        );
      }
    }

    const data = {
      version: 4,                                  // v4 = fractional anchored strokes
      coordinates: "anchor-relative-fraction",     // (fx, fy) ∈ [0,1]² of anchor rect
      url: location.href,
      title: document.title,
      savedAt: new Date().toISOString(),
      viewport: {
        width: window.innerWidth,
        height: window.innerHeight,
        devicePixelRatio: window.devicePixelRatio || 1,
      },
      document: {
        scrollWidth: document.documentElement.scrollWidth,
        scrollHeight: document.documentElement.scrollHeight,
      },
      strokes: strokesOut,
    };
    const blob = new Blob([JSON.stringify(data, null, 2)], {
      type: "application/json",
    });
    const url = URL.createObjectURL(blob);
    const slug = (document.title || "annotations")
      .toLowerCase().replace(/[^a-z0-9-_]+/g, "-").replace(/^-+|-+$/g, "")
      .slice(0, 60) || "annotations";
    const a = el("a", {
      href: url,
      download: slug + "__" + new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-") + ".json",
    });
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }
  function loadJson(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data || !Array.isArray(data.strokes)) {
          alert("Not a valid annotation file.");
          return;
        }
        strokes = realignStrokesToCurrentDocument(data);
        redraw();
      } catch (err) {
        alert("Failed to parse JSON: " + err.message);
      }
    };
    reader.readAsText(file);
  }

  // Convert any loaded stroke into v4-fractional in-memory format
  // so the rest of the app only deals with one shape:
  //   • Already v4 → kept as-is.
  //   • v3 (anchor + saved doc-coords + saved width/height) →
  //     compute (fx, fy) = (p.x - anchor.left)/anchor.width,
  //                         (p.y - anchor.top)/anchor.height
  //     using the SAVED anchor rect so the conversion is exact and
  //     does NOT depend on the current layout.
  //   • v3 missing width/height → unfortunately ambiguous; treat
  //     as legacy unanchored.
  //   • v2 unanchored → kept as-is; rendered via doc-coord fallback.
  function realignStrokesToCurrentDocument(data) {
    const strokesIn = Array.isArray(data.strokes) ? data.strokes : [];
    if (strokesIn.length === 0) return [];

    let v4Count = 0, v3to4 = 0, missing = 0, unanchored = 0;
    const out = [];
    for (const s of strokesIn) {
      const isFractional = s.points && s.points.length > 0
                        && s.points[0].fx !== undefined;
      if (s.v === 4 || isFractional) {
        v4Count++;
        out.push({ ...s, v: 4 });
        continue;
      }
      // v3 with full anchor (top/left/width/height + doc-coord points)
      if (s.anchor && s.anchor.id
          && typeof s.anchor.left === "number" && typeof s.anchor.top === "number"
          && s.anchor.width > 0 && s.anchor.height > 0
          && s.points && s.points.length > 0
          && s.points[0].x !== undefined) {
        const aL = s.anchor.left, aT = s.anchor.top;
        const aW = s.anchor.width, aH = s.anchor.height;
        out.push({
          v: 4,
          tool: s.tool, color: s.color, width: s.width,
          anchor: { id: s.anchor.id, savedWidth: aW, savedHeight: aH },
          points: s.points.map(p => ({
            fx: (p.x - aL) / aW,
            fy: (p.y - aT) / aH,
            p: p.p,
          })),
        });
        v3to4++;
        continue;
      }
      if (s.anchor && s.anchor.id) {
        missing++;  // v3-ish but missing dimensions; skip the conversion
      } else {
        unanchored++;
      }
      // Keep as legacy unanchored — render via the doc-coord fallback.
      out.push(s);
    }
    if (window.console) {
      console.info(
        "[annotation v4] Loaded v" + (data.version || "?") + ": " +
        "v4=" + v4Count + " v3→v4=" + v3to4 +
        " v3-no-dims=" + missing + " unanchored=" + unanchored
      );
      if (missing > 0 || unanchored > 0) {
        console.info(
          "[annotation v4] Strokes without enough info to convert " +
          "render at raw saved coords (zoom-fragile). Save .json on " +
          "the original layout to upgrade them to v4."
        );
      }
    }
    return out;
  }

  // Browsers do not allow JS to point a file picker at an arbitrary
  // directory (security: a page must not peek into your filesystem).
  // The closest we can do:
  //   * Modern browsers on https / localhost  →  File System Access API
  //     with an `id` derived from this document's path. After the user
  //     picks once, the browser remembers that directory and reopens it
  //     next time on THIS handout.
  //   * Safari / Firefox / file://             →  fall back to the
  //     hidden <input type=file>, which most browsers also remember.
  // First-time default is the Downloads folder, which is where Save
  // .json writes to.
  async function pickAndLoad() {
    const fileInput = document.querySelector("#annotation-toolbar input[type=file]");
    if (typeof window.showOpenFilePicker === "function") {
      try {
        // NOTE: this id is intentionally allowed to exceed the
        // browser's 32-char cap on long paths so that the call
        // throws and we fall through to the <input type=file>
        // path below — that fallback inherits Chrome's per-origin
        // "last folder used" memory, which is the UX the user
        // depends on day-to-day. (A short stable id would make
        // showOpenFilePicker succeed but each first-open would
        // start in Downloads instead of the most recent folder.)
        const id = "annotation-load-"
          + location.pathname.replace(/[^a-zA-Z0-9]+/g, "-").slice(0, 32);
        const [handle] = await window.showOpenFilePicker({
          id,
          startIn: "downloads",
          multiple: false,
          types: [{
            description: "Annotation JSON",
            accept: { "application/json": [".json"] },
          }],
        });
        const file = await handle.getFile();
        loadJson(file);
        return;
      } catch (err) {
        if (err && err.name === "AbortError") return; // user cancelled
        console.warn("showOpenFilePicker failed, falling back to <input type=file>", err);
      }
    }
    if (fileInput) fileInput.click();
  }

  function onKeyDown(e) {
    if (e.altKey && (e.key === "a" || e.key === "A")) {
      e.preventDefault();
      setEnabled(!enabled);
      return;
    }
    if (e.altKey && (e.key === "t" || e.key === "T")) {
      e.preventDefault();
      const visible = toolbar && toolbar.style.display !== "none";
      setToolbarVisible(!visible);
      return;
    }
    if (!enabled) return;
    if ((e.metaKey || e.ctrlKey) && e.key === "z") {
      e.preventDefault(); undo();
    } else if (e.key === "c" || e.key === "C") {
      setTool("cursor");
    } else if (e.key === "p" || e.key === "P") {
      setTool("pen");
    } else if (e.key === "h" || e.key === "H") {
      setTool("highlighter");
    } else if (e.key === "e" || e.key === "E") {
      setTool("eraser");
    } else if (e.key === "Escape") {
      setEnabled(false);
    }
  }

  function init() {
    if (document.getElementById("annotation-canvas")) return;
    if (window.console) {
      console.info(
        "[annotation v4] init — anchor-relative fractional " +
        "coordinates active."
      );
    }
    canvas = makeCanvas();
    resizeCanvas();
    toolbar = makeToolbar();
    showBtn = makeShowButton();
    document.body.appendChild(showBtn);
    // Restore previous position + visibility (if any).
    restoreToolbarPosition();
    restoreToolbarVisibility();
    setTool("pen");

    canvas.addEventListener("pointerdown", onPointerDown);
    canvas.addEventListener("pointermove", onPointerMove);
    canvas.addEventListener("pointerup", onPointerUp);
    canvas.addEventListener("pointercancel", onPointerUp);

    // Per-pointer-type touch-action policy (Surface / iPad pens):
    // The CSS `touch-action` property is per-element, not per-pointer-
    // type, so we can't statically allow "touch scrolls but pen
    // draws". Instead we exploit the fact that active stylus pens
    // (Surface Pen, Apple Pencil, etc.) emit `pointerover` /
    // `pointerenter` while still HOVERING above the screen, before
    // they make contact. We use that proximity window to flip the
    // canvas' touch-action to "none", so when the pen finally touches
    // down the browser doesn't pre-empt the gesture as a vertical
    // pan. As soon as the pen leaves proximity we restore the touch-
    // friendly default so finger swipes scroll the page again.
    canvas.addEventListener("pointerenter", (e) => {
      if (e.pointerType === "pen") {
        canvas.style.touchAction = "none";
      }
    });
    canvas.addEventListener("pointerleave", (e) => {
      if (e.pointerType === "pen") {
        canvas.style.touchAction = "pan-y pinch-zoom";
      }
    });
    window.addEventListener("resize", () => {
      resizeCanvas();
      clampToolbarPosition();
    });
    // Browser page-zoom doesn't always fire `resize` on `window`,
    // but it does notify VisualViewport — listen there too so v4
    // strokes immediately re-render at the new zoom level.
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", () => {
        resizeCanvas();
        clampToolbarPosition();
      });
    }
    window.addEventListener("keydown", onKeyDown);
    // Re-render whenever the user scrolls so strokes appear locked to
    // the underlying page content.
    let scrollRaf = 0;
    window.addEventListener("scroll", () => {
      if (scrollRaf) return;
      scrollRaf = requestAnimationFrame(() => {
        scrollRaf = 0;
        if (canvas.style.display !== "none") redraw();
      });
    }, { passive: true });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

<!--
  chalkboard-toolbar.html — Reveal.js chalkboard helper toolbar
  -------------------------------------------------------------
  Injected via _quarto.yml `format.revealjs.include-after-body`.
  Adds three small buttons at the top-right of the slide deck so the
  lecturer doesn't need to memorise keyboard shortcuts during a live
  class.

      💾 Save board   → RevealChalkboard.download()        (key: D)
      📂 Load board   → file-picker, writes JSON to sessionStorage,
                        then reloads. The chalkboard plugin will pick
                        the data up via its `storage` config option.
      🗑 Clear board  → wipes the sessionStorage entry and reloads
                        (a fresh deck without persisted strokes).

  How loading works
  -----------------
  Quarto's chalkboard plugin loads previous strokes from
  `sessionStorage[ chalkboard.storage ]` if that YAML option is set.
  We exploit this: the Load button writes the user-picked JSON into
  the same key, then `location.reload()` lets the plugin's normal
  init path restore the strokes. No internal API hacking required.

  Per-slide YAML must therefore include:

      chalkboard:
        storage: <unique-key-per-deck>
        # src: my-board.json   # optional, baseline shipped with repo
                               # used when sessionStorage is empty
                               # (great for GitHub Pages publishing)
-->
<script>
(function () {
  "use strict";

  function getStorageKey() {
    if (window.Reveal && Reveal.getConfig) {
      const cfg = Reveal.getConfig().chalkboard || {};
      if (cfg.storage) return cfg.storage;
    }
    return null;
  }

  const BTN_STYLE = {
    padding: "6px 12px",
    background: "rgba(255,255,255,0.92)",
    border: "1px solid #d1d5db",
    borderRadius: "6px",
    font: "13px/1.2 system-ui, -apple-system, sans-serif",
    color: "#111827",
    cursor: "pointer",
    boxShadow: "0 2px 6px rgba(0,0,0,0.10)",
    userSelect: "none",
  };

  function makeBtn(label, title, onClick, extraStyle) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.title = title;
    btn.textContent = label;
    Object.assign(btn.style, BTN_STYLE, extraStyle || {});
    btn.addEventListener("click", onClick);
    return btn;
  }

  function makeToolbar() {
    if (document.getElementById("chalkboard-toolbar")) return;

    const bar = document.createElement("div");
    bar.id = "chalkboard-toolbar";
    Object.assign(bar.style, {
      position: "fixed",
      top: "10px",
      right: "10px",
      zIndex: "100",
      display: "flex",
      gap: "6px",
      alignItems: "center",
    });

    // ─── Save ────────────────────────────────────────────────────────
    const saveBtn = makeBtn(
      "💾 Save board",
      "Save chalkboard / notes annotations as JSON  (shortcut: D)",
      function () {
        if (window.RevealChalkboard && typeof RevealChalkboard.download === "function") {
          RevealChalkboard.download();
        } else {
          alert("Chalkboard plugin not loaded yet — try again in a moment.");
        }
      }
    );

    // ─── Load (file picker → sessionStorage → reload) ───────────────
    //
    // Browsers don't allow arbitrary directories as the initial folder
    // (security: a page mustn't peek into your filesystem). What we can
    // do is:
    //   * Use the File System Access API with an `id` derived from the
    //     deck's path so the browser remembers "where you picked from
    //     last time on THIS deck" — after the first pick, it always
    //     reopens in that directory.
    //   * Fall back to <input type=file>, which most browsers also
    //     remember the last directory of.
    // First-time default is `downloads/`, since 💾 Save board writes
    // there.

    function applyJsonText(jsonText) {
      const key = getStorageKey();
      if (!key) {
        alert(
          "This slide deck doesn't have `chalkboard.storage` configured " +
          "in its YAML, so dynamic load is not available.\n\n" +
          "Add `chalkboard: { storage: <unique-key> }` to the .qmd " +
          "front-matter, then re-render."
        );
        return;
      }
      try {
        JSON.parse(jsonText); // sanity-check
        sessionStorage.setItem(key, jsonText);
        location.reload();
      } catch (err) {
        alert("Failed to parse JSON: " + err.message);
      }
    }

    // Hidden legacy <input type="file"> as fallback for browsers that
    // don't expose `showOpenFilePicker` (Safari, Firefox, file:// URLs).
    const fileInput = document.createElement("input");
    fileInput.type = "file";
    fileInput.accept = "application/json,.json";
    fileInput.style.display = "none";
    fileInput.addEventListener("change", function (e) {
      const f = e.target.files && e.target.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = function (ev) { applyJsonText(ev.target.result); };
      reader.readAsText(f);
      e.target.value = "";
    });

    async function pickAndLoad() {
      // Modern path: showOpenFilePicker — supports `id` to remember the
      // last-used directory per slide deck.
      if (typeof window.showOpenFilePicker === "function") {
        try {
          const [handle] = await window.showOpenFilePicker({
            id: "chalkboard-load-" + location.pathname.replace(/[^a-zA-Z0-9]+/g, "-").slice(0, 32),
            startIn: "downloads",
            multiple: false,
            types: [{
              description: "Chalkboard JSON",
              accept: { "application/json": [".json"] },
            }],
          });
          const file = await handle.getFile();
          const text = await file.text();
          applyJsonText(text);
          return;
        } catch (err) {
          if (err && err.name === "AbortError") return; // user cancelled
          console.warn("showOpenFilePicker failed, falling back to <input type=file>", err);
        }
      }
      // Fallback path
      fileInput.click();
    }

    const loadBtn = makeBtn(
      "📂 Load board",
      "Load a chalkboard JSON file. The browser will remember which folder " +
      "you picked from last time on this deck.",
      function () { pickAndLoad(); }
    );

    // ─── Clear (wipe sessionStorage + reload) ───────────────────────
    const clearBtn = makeBtn(
      "🗑 Clear board",
      "Discard persisted strokes for this deck and reload a fresh deck",
      function () {
        const key = getStorageKey();
        if (!key) {
          alert("No `chalkboard.storage` key configured for this deck.");
          return;
        }
        if (!confirm("Discard all persisted strokes for this slide deck and reload?")) return;
        sessionStorage.removeItem(key);
        location.reload();
      }
    );

    // ─── "loaded" badge if sessionStorage already has data ──────────
    const key = getStorageKey();
    if (key) {
      const stored = sessionStorage.getItem(key);
      if (stored && stored !== "null" && stored !== "[]") {
        const badge = document.createElement("span");
        badge.textContent = "📂 loaded";
        badge.title = "Strokes restored from sessionStorage  (key: " + key + ")";
        Object.assign(badge.style, {
          font: "12px/1.2 system-ui, -apple-system, sans-serif",
          color: "#065f46",
          padding: "3px 8px",
          background: "rgba(220,252,231,0.95)",
          border: "1px solid #a7f3d0",
          borderRadius: "999px",
          marginRight: "4px",
          userSelect: "none",
        });
        bar.appendChild(badge);
      }
    }

    bar.appendChild(saveBtn);
    bar.appendChild(loadBtn);
    bar.appendChild(clearBtn);
    bar.appendChild(fileInput);

    document.body.appendChild(bar);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", makeToolbar);
  } else {
    makeToolbar();
  }
})();
</script>
